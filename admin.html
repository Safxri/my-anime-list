<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - เพิ่มอนิเมะเข้าระบบ</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background: #1a1a1a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .admin-card { background: #2d2d2d; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #ff4757; }
        label { display: block; margin-top: 15px; font-size: 0.9rem; color: #ccc; }
        input { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #444; background: #1a1a1a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; margin-top: 25px; background: #ff4757; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.3s; }
        button:hover { background: #ff6b81; transform: translateY(-2px); }
        #status { text-align: center; margin-top: 15px; font-size: 0.9rem; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #888; text-decoration: none; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="admin-card">
    <h2>เพิ่มอนิเมะใหม่</h2>
    
    <label>ชื่อเรื่องอนิเมะ</label>
    <input type="text" id="animeTitle" placeholder="เช่น One Piece, Naruto">

    <label>ลิงก์รูปภาพหน้าปก (URL)</label>
    <input type="text" id="animeImage" placeholder="https://example.com/image.jpg">

    <button onclick="addAnime()">บันทึกลงระบบ</button>
    
    <p id="status"></p>
    <a href="index.html" class="back-link">← กลับไปหน้าหลัก</a>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

    // *** นำ Firebase Config ที่คุณก๊อปปี้มาจากหน้า Console มาวางตรงนี้ ***
    const firebaseConfig = {
    apiKey: "AIzaSyADNWKhUNqKyF19d-2WBHsHQ1uaZIAN8Bg",
    authDomain: "myanimeweb-1e859.firebaseapp.com",
    projectId: "myanimeweb-1e859",
    storageBucket: "myanimeweb-1e859.firebasestorage.app",
    messagingSenderId: "1018346930735",
    appId: "1:1018346930735:web:dd2d015e2a1f0c628b3cda",
    measurementId: "G-0JZN53NYFD"
    };

    // เริ่มทำงาน Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // ฟังก์ชันส่งข้อมูล
    window.addAnime = async () => {
        const title = document.getElementById('animeTitle').value;
        const img = document.getElementById('animeImage').value;
        const statusText = document.getElementById('status');

        if (!title || !img) {
            alert("กรุณากรอกข้อมูลให้ครบถ้วนนะครับ");
            return;
        }

        statusText.innerText = "กำลังบันทึก...";
        statusText.style.color = "orange";

        try {
            // ส่งข้อมูลไปที่ Collection ชื่อ 'all_anime' ที่เราสร้างไว้ใน Firestore
            await addDoc(collection(db, "all_anime"), {
                title: title,
                image: img,
                createdAt: serverTimestamp()
            });

            statusText.innerText = "✅ เพิ่มอนิเมะสำเร็จแล้ว!";
            statusText.style.color = "#2ed573";

            // ล้างค่าในช่องกรอก
            document.getElementById('animeTitle').value = "";
            document.getElementById('animeImage').value = "";

        } catch (error) {
            console.error("Error: ", error);
            statusText.innerText = "❌ เกิดข้อผิดพลาด กรุณาเช็ค Rules ใน Firebase";
            statusText.style.color = "#ff4757";
        }
    }
</script>

</body>
</html>
