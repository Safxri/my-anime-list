<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My HUB | v14</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --netflix-red: #E50914;
            --netflix-black: #141414;
            --navbar-height: 70px;
        }

        * {
            box-sizing: border-box;
            font-family: 'Kanit', sans-serif;
            margin: 0; padding: 0;
        }

        body {
            background-color: var(--netflix-black);
            color: white;
            padding-top: var(--navbar-height);
        }

        /* --- NAVBAR --- */
        nav {
            background-color: rgba(20, 20, 20, 0.95);
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: var(--navbar-height);
            padding: 0 4%;
            position: fixed;
            top: 0; width: 100%;
            z-index: 1000;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .nav-logo {
            color: var(--netflix-red);
            font-size: 1.8rem;
            font-weight: 700;
            text-decoration: none;
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 20px;
            font-weight: 300;
        }

        .nav-menu li:hover {
            color: #b3b3b3;
            cursor: pointer;
        }

        /* ย้าย Search เข้ามาใน Navbar */
        .nav-right-group {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .navbar-search {
            position: relative;
        }

        .navbar-search input {
            background-color: #333;
            border: 1px solid #444;
            color: white;
            border-radius: 4px;
            padding: 8px 12px 8px 35px;
            font-size: 0.9rem;
            width: 250px; /* ความกว้างช่องค้นหา */
        }

        .search-icon-inline {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: #888;
        }

        .user-nav-display {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-avatar {
            width: 32px; height: 32px;
            border-radius: 4px;
            object-fit: cover;
        }

        /* --- CONTENT AREA --- */
        .container {
            padding: 30px 4%;
        }

        .section-title {
            font-size: 1.4rem;
            margin-bottom: 20px;
            font-weight: 500;
        }

        /* ปรับขนาด Grid ให้การ์ดใหญ่ขึ้น */
        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); /* ขยาย min-width การ์ด */
            gap: 15px;
        }

        .anime-card {
            background-color: #181818;
            border-radius: 6px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .anime-card:hover {
            transform: scale(1.05); /* ขยายเล็กน้อยเวลา hover */
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5); /* เพิ่มเงา */
        }

        .card-img-container {
            width: 100%;
            aspect-ratio: 2 / 3;
            overflow: hidden;
        }

        .card-img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-info {
            padding: 10px;
            text-align: center;
        }

        .card-title {
            font-size: 0.9rem;
            font-weight: 400;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis; /* ตัดคำถ้าชื่อยาวเกิน */
        }

        /* --- AUTH SECTION --- */
        .auth-container {
            max-width: 400px;
            margin: 100px auto 0;
            background-color: rgba(0, 0, 0, 0.75);
            padding: 60px;
            border-radius: 4px;
            text-align: center;
        }

        .auth-container h1 { font-weight: 500; margin-bottom: 20px; }
        .auth-input { width: 100%; padding: 10px; margin-bottom: 15px; background: #333; border: none; color: white; border-radius: 4px; }
        .btn-red { width: 100%; padding: 12px; background-color: var(--netflix-red); border: none; color: white; border-radius: 4px; font-weight: 600; cursor: pointer; }

        /* --- MODAL --- */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.8); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background-color: var(--netflix-black); width: 90%; max-width: 500px; padding: 30px; border-radius: 6px; position: relative; }
        .close-modal { position: absolute; top: 10px; right: 15px; font-size: 1.5rem; cursor: pointer; color: #888; }
    </style>
</head>
<body>

<nav>
    <div class="nav-left">
        <a href="#" class="nav-logo">MY HUB</a>
        <ul class="nav-menu">
            <li>หน้าหลัก</li>
            <li>รายการ</li>
            <li>อนิเมะ</li>
        </ul>
    </div>
    <div class="nav-right-group" id="nav-right-content" style="display:none;">
        <div class="navbar-search">
            <span class="search-icon-inline">🔍</span>
            <input type="text" id="navbar-search-input" placeholder="ค้นหาชื่อเรื่อง..." onkeyup="searchAnime()">
        </div>
        <div class="user-nav-display">
            <span id="nav-username"></span>
            <img id="nav-avatar" class="nav-avatar" src="" alt="Avatar">
        </div>
    </div>
</nav>

<div class="container">
    <div id="auth-ui" class="auth-container">
        <h1>Sign In</h1>
        <input type="email" id="email" class="auth-input" placeholder="tungpanithan1931@gmail.com">
        <input type="password" id="password" class="auth-input" placeholder="********">
        <button class="btn-red" onclick="handleAuth()">เข้าสู่ระบบ</button>
        <p style="margin-top:15px; font-size:0.8rem; color:#888;">ยังไม่มีบัญชี? สมัครสมาชิกที่นี่</p>
    </div>

    <div id="main-ui" style="display:none;">
        <h2 class="section-title">อนิเมะแนะนำ</h2>
        <div class="content-grid" id="anime-display"></div>
    </div>
</div>

<div id="profile-modal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal('profile-modal')">&times;</span>
        <h3 style="margin-bottom:20px;">ตั้งค่าโปรไฟล์</h3>
        <input type="text" id="p-nickname" class="auth-input" placeholder="ชื่อเล่น">
        <input type="text" id="p-avatar" class="auth-input" placeholder="URL รูปโปรไฟล์">
        <button class="btn-red" onclick="saveProfile()">บันทึก</button>
        <button onclick="handleLogout()" style="margin-top:10px; background:none; border:none; color:#888; cursor:pointer;">ออกจากระบบ</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

    // ✅ ใช้ Config จริงของคุณ
    const firebaseConfig = {
        apiKey: "AIzaSyADNWKhUNqKyF19d-2WBHsHQ1uaZIAN8Bg",
        authDomain: "myanimeweb-1e859.firebaseapp.com",
        projectId: "myanimeweb-1e859",
        storageBucket: "myanimeweb-1e859.firebasestorage.app",
        messagingSenderId: "1018346930735",
        appId: "1:1018346930735:web:dd2d015e2a1f0c628b3cda"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let animeMasterData = [];

    // --- AUTH ---
    window.handleAuth = () => {
        const e = document.getElementById('email').value || "tungpanithan1931@gmail.com";
        const p = document.getElementById('password').value || "tungpanithan";
        signInWithEmailAndPassword(auth, e, p).catch(err => alert("Error: " + err.message));
    };

    window.handleLogout = () => signOut(auth);

    onAuthStateChanged(auth, user => {
        if (user) {
            document.getElementById('auth-ui').style.display = 'none';
            document.getElementById('main-ui').style.display = 'block';
            document.getElementById('nav-right-content').style.display = 'flex';
            setupUserNav(user);
            loadAnimeData();
        } else {
            document.getElementById('auth-ui').style.display = 'block';
            document.getElementById('main-ui').style.display = 'none';
            document.getElementById('nav-right-content').style.display = 'none';
        }
    });

    async function setupUserNav(user) {
        const uDoc = await getDoc(doc(db, "users", user.uid));
        const userData = uDoc.exists() ? uDoc.data() : { 
            nickname: user.email.split('@')[0], 
            avatar: "https://upload.wikimedia.org/wikipedia/commons/0/0b/Netflix-avatar.png" 
        };
        
        document.getElementById('nav-username').innerText = userData.nickname;
        document.getElementById('nav-avatar').src = userData.avatar;
        document.getElementById('nav-avatar').onclick = () => openProfileModal(userData);
    }

    // --- DATA ---
    async function loadAnimeData() {
        // ✅ ใช้ชื่อ Collection "all_anime" ตาม Config คุณ
        const snap = await getDocs(query(collection(db, "all_anime"), orderBy("title", "asc")));
        animeMasterData = snap.docs.map(d => d.data());
        displayAnime(animeMasterData);
    }

    function displayAnime(data) {
        const display = document.getElementById('anime-display');
        display.innerHTML = "";
        data.forEach(item => {
            display.innerHTML += `
                <div class="anime-card">
                    <div class="card-img-container">
                        <img src="${item.image}" alt="${item.title}">
                    </div>
                    <div class="card-info">
                        <div class="card-title">${item.title}</div>
                    </div>
                </div>
            `;
        });
    }

    // --- SEARCH ---
    window.searchAnime = () => {
        const q = document.getElementById('navbar-search-input').value.toLowerCase();
        displayAnime(animeMasterData.filter(a => a.title.toLowerCase().includes(q)));
    };

    // --- PROFILE MODAL ---
    function openProfileModal(data) {
        document.getElementById('p-nickname').value = data.nickname;
        document.getElementById('p-avatar').value = data.avatar;
        document.getElementById('profile-modal').style.display = 'flex';
    }

    window.closeModal = (id) => document.getElementById(id).style.display = 'none';

    window.saveProfile = async () => {
        const uid = auth.currentUser.uid;
        const nick = document.getElementById('p-nickname').value;
        const ava = document.getElementById('p-avatar').value;
        await setDoc(doc(db, "users", uid), { nickname: nick, avatar: ava });
        closeModal('profile-modal');
        setupUserNav(auth.currentUser);
    }
</script>
</body>
</html>
