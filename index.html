<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY HUB | v53 Full Restoration</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* =========================================
           1. CORE SETTINGS (ตัวแปรหลัก)
           ========================================= */
        :root {
            --primary-red: #E50914;
            --main-bg: #141414;
            --card-bg: #181818;
            --text-gray: #b3b3b3;
            --nav-height: 70px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background-color: var(--main-bg);
            color: white;
            overflow-x: hidden;
        }

        /* =========================================
           2. NAVIGATION BAR (แถบเมนูบน)
           ========================================= */
        nav {
            background: rgba(0, 0, 0, 0.9);
            height: var(--nav-height);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 4%;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }

        .nav-logo {
            color: var(--primary-red);
            font-size: 1.8rem;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 20px;
            margin-left: 30px;
        }

        .nav-links li {
            color: var(--text-gray);
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .nav-links li:hover {
            color: white;
        }

        .user-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatar-img {
            width: 35px;
            height: 35px;
            border-radius: 4px;
            object-fit: cover;
            cursor: pointer;
        }

        /* =========================================
           3. AUTHENTICATION (หน้าเข้าสู่ระบบ)
           ========================================= */
        #auth-page {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* แก้ไขลิงก์ที่ 404 ใน image_864d41.png */
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://assets.nflxext.com/ffe/siteui/vlv3/f8ca36a4-ac20-4af2-9645-092df8591476/be0195e3-4610-4f81-9993-47000780f2d7/TH-en-20220523-popsignuptwoweeks-perspective_alpha_website_large.jpg');
            background-size: cover;
            background-position: center;
        }

        .auth-box {
            background: rgba(0, 0, 0, 0.75);
            padding: 60px;
            width: 450px;
            border-radius: 8px;
        }

        .auth-box h2 {
            font-size: 2rem;
            margin-bottom: 25px;
        }

        .auth-box input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            background: #333;
            border: none;
            border-radius: 4px;
            color: white;
            font-size: 1rem;
        }

        .btn-main {
            background: var(--primary-red);
            color: white;
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }

        /* =========================================
           4. ADMIN PANEL (จัดการเนื้อหา)
           ========================================= */
        .admin-panel {
            background: #222;
            padding: 25px;
            border-radius: 8px;
            margin-bottom: 40px;
            border: 1px solid #333;
        }

        .admin-panel h3 {
            color: var(--primary-red);
            margin-bottom: 20px;
            font-size: 1.1rem;
        }

        .admin-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .admin-row input, .admin-row select {
            flex: 1;
            padding: 12px;
            background: #111;
            border: 1px solid #444;
            color: white;
            border-radius: 4px;
        }

        /* =========================================
           5. CONTENT DISPLAY (แสดงผลการ์ด)
           ========================================= */
        .main-container {
            padding: 100px 4% 50px;
        }

        .section-title {
            font-size: 1.5rem;
            margin-bottom: 20px;
            border-left: 4px solid var(--primary-red);
            padding-left: 15px;
        }

        .grid-layout {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .movie-card {
            background: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .movie-card:hover {
            transform: scale(1.05);
            z-index: 10;
        }

        .movie-card img {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
        }

        .card-details {
            padding: 15px;
            text-align: center;
        }

        .check-icon {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #2ed573;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid white;
            font-size: 0.8rem;
        }

        /* =========================================
           6. PROFILE MODAL (แก้ไขโปรไฟล์)
           ========================================= */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal-card {
            background: #181818;
            width: 400px;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
        }

        /* จัดระเบียบช่อง Input ใหม่ให้แยกบรรทัดกัน */
        .profile-input-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin: 25px 0;
        }

        .profile-input-group input {
            width: 100%;
            padding: 12px;
            background: #222;
            border: 1px solid #444;
            color: white;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<nav id="nav-bar" style="display:none;">
    <div style="display:flex; align-items:center;">
        <div class="nav-logo" onclick="location.reload()">MY HUB</div>
        <ul class="nav-links">
            <li onclick="window.goHome()">หน้าแรก</li>
            <li onclick="window.filterBy('Anime')">อนิเมะ</li>
            <li onclick="window.filterBy('Movie')">หนัง</li>
        </ul>
    </div>
    <div class="user-section" id="profile-area"></div>
</nav>

<div id="auth-page">
    <div class="auth-box">
        <h2>เข้าสู่ระบบ</h2>
        <input type="email" id="email" placeholder="อีเมล">
        <input type="password" id="password" placeholder="รหัสผ่าน">
        <button class="btn-main" onclick="window.handleLogin()">เข้าสู่ระบบ</button>
    </div>
</div>

<div id="main-content" class="main-container" style="display:none;">
    
    <div id="admin-panel" class="admin-panel" style="display:none;">
        <h3>จัดการเนื้อหา (Admin Only)</h3>
        <div class="admin-row">
            <input type="text" id="adm-title" placeholder="ชื่อเรื่อง">
            <input type="text" id="adm-url" placeholder="URL รูปปก">
            <select id="adm-type">
                <option value="Anime">Anime</option>
                <option value="Movie">Movie</option>
            </select>
            <button class="btn-main" style="width:100px; margin:0;" onclick="window.saveContent()">บันทึก</button>
        </div>
    </div>

    <h2 class="section-title">รายการแนะนำ</h2>
    <div id="content-grid" class="grid-layout"></div>
</div>

<div id="profile-modal" class="modal-overlay">
    <div class="modal-card">
        <h3>แก้ไขโปรไฟล์</h3>
        <div class="profile-input-group">
            <input type="text" id="p-name" placeholder="ชื่อเล่นของคุณ">
            <input type="text" id="p-url" placeholder="URL รูปโปรไฟล์">
        </div>
        <button class="btn-main" onclick="window.updateProfile()">บันทึกข้อมูล</button>
        <button class="btn-main" style="background:#444; margin-top:10px;" onclick="window.handleLogout()">ออกจากระบบ</button>
        <p style="margin-top:15px; cursor:pointer; color:gray;" onclick="window.closeModal()">ยกเลิก</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyADNWKhUNqKyF19d-2WBHsHQ1uaZIAN8Bg",
        authDomain: "myanimeweb-1e859.firebaseapp.com",
        projectId: "myanimeweb-1e859",
        storageBucket: "myanimeweb-1e859.firebasestorage.app",
        messagingSenderId: "1018346930735",
        appId: "1:1018346930735:web:dd2d015e2a1f0c628b3cda"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // ติดตามสถานะผู้ใช้
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            document.getElementById('auth-page').style.display = 'none';
            document.getElementById('nav-bar').style.display = 'flex';
            document.getElementById('main-content').style.display = 'block';
            
            if(user.email === "tungpanithan1931@gmail.com") {
                document.getElementById('admin-panel').style.display = 'block';
            }
            
            await loadUserData(user);
            await loadContent();
        } else {
            document.getElementById('auth-page').style.display = 'flex';
            document.getElementById('nav-bar').style.display = 'none';
            document.getElementById('main-content').style.display = 'none';
        }
    });

    // โหลดข้อมูลโปรไฟล์
    async function loadUserData(user) {
        const d = await getDoc(doc(db, "users", user.uid));
        const name = d.exists() ? d.data().nickname : user.email.split('@')[0];
        const avatar = d.exists() ? d.data().avatar : "https://upload.wikimedia.org/wikipedia/commons/0/0b/Netflix-avatar.png";
        
        document.getElementById('profile-area').innerHTML = `
            <span>${name}</span>
            <img src="${avatar}" class="avatar-img" onclick="window.openProfile('${name}','${avatar}')">
        `;
    }

    // โหลดเนื้อหา
    async function loadContent() {
        const snap = await getDocs(collection(db, "all_anime"));
        const grid = document.getElementById('content-grid');
        grid.innerHTML = "";
        
        snap.forEach(doc => {
            const item = doc.data();
            grid.innerHTML += `
                <div class="movie-card">
                    <img src="${item.image}">
                    <div class="card-details">
                        <p>${item.title}</p>
                    </div>
                </div>`;
        });
    }

    // ฟังก์ชันระดับ Window
    window.handleLogin = () => {
        const e = document.getElementById('email').value;
        const p = document.getElementById('password').value;
        signInWithEmailAndPassword(auth, e, p).catch(err => alert("ลองใหม่อีกครั้งครับ"));
    };

    window.handleLogout = () => signOut(auth).then(() => location.reload());

    window.openProfile = (n, a) => {
        document.getElementById('p-name').value = n;
        document.getElementById('p-url').value = a;
        document.getElementById('profile-modal').style.display = 'flex';
    };

    window.closeModal = () => document.getElementById('profile-modal').style.display = 'none';

    window.updateProfile = async () => {
        await setDoc(doc(db, "users", auth.currentUser.uid), {
            nickname: document.getElementById('p-name').value,
            avatar: document.getElementById('p-url').value
        });
        location.reload();
    };

    window.saveContent = async () => {
        await addDoc(collection(db, "all_anime"), {
            title: document.getElementById('adm-title').value,
            image: document.getElementById('adm-url').value,
            type: document.getElementById('adm-type').value,
            created: new Date()
        });
        location.reload();
    };
</script>
</body>
</html>
