<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY HUB | v29 Full Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --netflix-red: #E50914; --netflix-black: #141414; --nav-height: 70px; }
        * { box-sizing: border-box; }
        body { font-family: 'Kanit', sans-serif; background-color: var(--netflix-black); color: white; margin: 0; padding: 0; overflow-x: hidden; }

        /* --- NAVBAR: แก้ไขตำแหน่ง Search ให้ตรงกัน --- */
        nav { background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, transparent 100%); padding: 0 4%; display: flex; align-items: center; justify-content: space-between; height: var(--nav-height); position: fixed; top: 0; width: 100%; z-index: 1000; transition: 0.3s; }
        nav.scrolled { background-color: var(--netflix-black); border-bottom: 1px solid #333; }
        .nav-left { display: flex; align-items: center; gap: 30px; }
        .nav-logo { color: var(--netflix-red); font-size: 1.8rem; font-weight: 700; text-decoration: none; cursor: pointer; }
        .nav-menu { display: flex; list-style: none; gap: 20px; padding: 0; margin: 0; cursor: pointer; color: #e5e5e5; font-size: 0.95rem; }
        .nav-menu li:hover { color: white; }
        
        .nav-right-group { display: flex; align-items: center; gap: 20px; }
        
        /* แก้ไข Search Box ให้แว่นขยายตรงกับตัวหนังสือ */
        .search-box { position: relative; width: 300px; display: flex; align-items: center; }
        .search-box input { 
            background: rgba(255,255,255,0.15); 
            border: 1px solid #444; 
            border-radius: 25px; 
            padding: 10px 15px 10px 45px; /* เว้นซ้ายให้ไอคอน */
            width: 100%; 
            color: white; 
            outline: none; 
            font-size: 0.95rem; 
            transition: 0.3s;
        }
        .search-icon { 
            position: absolute; 
            left: 15px; 
            top: 50%; 
            transform: translateY(-50%); /* กึ่งกลางแนวตั้งแม่นยำ */
            color: #aaa; 
            font-size: 1.1rem;
            pointer-events: none;
        }

        .user-box { display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 5px 10px; border-radius: 20px; transition: 0.2s; }
        .user-img { width: 34px; height: 34px; border-radius: 4px; object-fit: cover; border: 1px solid #444; }

        /* --- CONTENT: ขนาดการ์ดใหญ่สะใจ 280px --- */
        .container { padding: 100px 4% 60px; max-width: 100%; }
        .section-title { font-size: 1.8rem; margin: 40px 0 25px; border-left: 5px solid var(--netflix-red); padding-left: 20px; }
        .content-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        
        .card { position: relative; background: #222; border-radius: 12px; overflow: hidden; aspect-ratio: 2/3; transition: 0.4s ease; cursor: pointer; }
        .card:hover { transform: translateY(-10px); z-index: 5; box-shadow: 0 15px 35px rgba(0,0,0,0.6); }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .card-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, rgba(0,0,0,1) 0%, transparent 100%); padding: 50px 15px 20px; text-align: center; }
        .card-title { font-size: 1.25rem; color: #fff; font-weight: 500; }

        /* --- ADMIN & HISTORY TOOLS --- */
        .btn-clear-history { position: absolute; top: 12px; right: 12px; background: var(--netflix-red); color: white; border: none; width: 28px; height: 28px; border-radius: 50%; cursor: pointer; z-index: 20; display: none; }
        .card:hover .btn-clear-history { display: flex; align-items: center; justify-content: center; }
        #admin-panel { display: none; background: #111; padding: 30px; border-radius: 15px; margin-bottom: 30px; border: 1px solid #333; }

        /* --- AUTH SYSTEM --- */
        .auth-card { max-width: 450px; margin: 12vh auto; background: rgba(0,0,0,0.9); padding: 60px; border-radius: 12px; text-align: center; }
        .btn-red { background: var(--netflix-red); color: white; border: none; padding: 15px; border-radius: 6px; cursor: pointer; font-weight: 600; width: 100%; margin-top: 15px; }
        input, select { padding: 15px; background: #333; border: 1px solid #444; color: white; border-radius: 6px; width: 100%; margin-bottom: 15px; font-family: 'Kanit'; }
        #auth-switch { margin-top: 25px; font-size: 0.95rem; color: #aaa; cursor: pointer; }

        /* --- MODALS --- */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); align-items: center; justify-content: center; z-index: 3000; padding: 20px; }
        .modal-content { background: #181818; width: 100%; max-width: 900px; padding: 40px; border-radius: 20px; position: relative; max-height: 90vh; overflow-y: auto; }
        .season-card { background: #222; border-radius: 12px; overflow: hidden; cursor: pointer; position: relative; border: 3px solid transparent; transition: 0.3s; }
        .season-card.watched { border-color: #2ed573; }
        .check-mark { position: absolute; top: 12px; right: 12px; background: #2ed573; color: white; border-radius: 50%; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; font-size: 15px; }
    </style>
</head>
<body>

<nav id="navbar">
    <div class="nav-left">
        <a class="nav-logo" onclick="location.reload()">MY HUB</a>
        <ul class="nav-menu">
            <li onclick="showHome()">หน้าหลัก</li>
            <li onclick="filterCategory('Movie')">หนัง</li>
            <li onclick="filterCategory('Series')">ซีรีส์</li>
            <li onclick="filterCategory('Anime')">อนิเมะ</li>
            <li onclick="showOnlyWatched()" style="color:#2ed573; font-weight:600;">ประวัติการดู</li>
        </ul>
    </div>
    <div class="nav-right-group" id="nav-right" style="display:none;">
        <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="text" id="search-input" placeholder="ค้นหาชื่อเรื่อง..." onkeyup="handleSearch()">
        </div>
        <div id="user-display"></div>
    </div>
</nav>

<div id="auth-ui" class="auth-card">
    <h1 id="auth-title">Sign In</h1>
    <input type="email" id="email" placeholder="อีเมล">
    <input type="password" id="password" placeholder="รหัสผ่าน">
    <button class="btn-red" onclick="runAuth()" id="auth-btn">เข้าสู่ระบบ</button>
    <p id="auth-switch" onclick="toggleAuth()">ยังไม่มีบัญชี? <b>สมัครสมาชิกที่นี่</b></p>
</div>

<div id="main-ui" class="container" style="display:none;">
    <div id="admin-panel">
        <h3 id="adm-header" style="color:var(--netflix-red); margin-top:0;">แผงจัดการเนื้อหา</h3>
        <div style="display:grid; grid-template-columns: 2fr 2fr 1fr auto; gap:15px;">
            <input type="text" id="adm-title" placeholder="ชื่อเรื่อง">
            <input type="text" id="adm-img" placeholder="URL ปก">
            <select id="adm-cat"><option value="Anime">Anime</option><option value="Movie">Movie</option><option value="Series">Series</option></select>
            <button class="btn-red" onclick="addToDatabase()" style="width:120px; margin:0;">บันทึก</button>
        </div>
        <div id="season-inputs"></div>
        <button onclick="addSeasonField()" style="background:#222; color:#ccc; border:1px solid #444; padding:10px; border-radius:6px; cursor:pointer; margin-top:10px;">+ เพิ่มซีซัน</button>
    </div>

    <div id="watched-section" style="display:none;">
        <h2 class="section-title" style="color:#2ed573;">รับชมต่อจากครั้งก่อน</h2>
        <div class="content-grid" id="watched-grid"></div>
    </div>

    <div id="main-content-area">
        <h2 class="section-title" id="cat-label">รายการแนะนำ</h2>
        <div class="content-grid" id="main-grid"></div>
    </div>
</div>

<div id="profile-modal" class="modal">
    <div class="modal-content" style="max-width:400px;">
        <h3>แก้ไขโปรไฟล์</h3>
        <input type="text" id="edit-nickname" placeholder="ชื่อเล่น">
        <input type="text" id="edit-avatar" placeholder="URL รูปโปรไฟล์">
        <button class="btn-red" onclick="saveProfile()">บันทึก</button>
        <button class="btn-red" style="background:#444;" onclick="triggerLogout()">ออกจากระบบ</button>
        <button class="btn-red" style="background:transparent;" onclick="closeModal('profile-modal')">ปิด</button>
    </div>
</div>

<div id="detail-modal" class="modal">
    <div class="modal-content">
        <h2 id="modal-title" style="margin-bottom:30px;"></h2>
        <div id="season-list" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(180px, 1fr)); gap:25px;"></div>
        <button class="btn-red" onclick="closeModal('detail-modal')" style="width:150px; margin-top:40px;">ปิด</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, collection, addDoc, getDocs, query, where, orderBy, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyADNWKhUNqKyF19d-2WBHsHQ1uaZIAN8Bg",
        authDomain: "myanimeweb-1e859.firebaseapp.com",
        projectId: "myanimeweb-1e859",
        storageBucket: "myanimeweb-1e859.firebasestorage.app",
        messagingSenderId: "1018346930735",
        appId: "1:1018346930735:web:dd2d015e2a1f0c628b3cda"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const ADMIN_MAIL = "tungpanithan1931@gmail.com";

    let allData = [], watchedListRaw = [], isRegisterMode = false;

    // --- AUTH & NAV ---
    window.toggleAuth = () => {
        isRegisterMode = !isRegisterMode;
        document.getElementById('auth-title').innerText = isRegisterMode ? "Sign Up" : "Sign In";
        document.getElementById('auth-btn').innerText = isRegisterMode ? "สมัครสมาชิก" : "เข้าสู่ระบบ";
        document.getElementById('auth-switch').innerHTML = isRegisterMode ? "มีบัญชีอยู่แล้ว? <b>เข้าสู่ระบบ</b>" : "ยังไม่มีบัญชี? <b>สมัครสมาชิกที่นี่</b>";
    };

    window.runAuth = () => {
        const m = document.getElementById('email').value, p = document.getElementById('password').value;
        if(isRegisterMode) createUserWithEmailAndPassword(auth, m, p).catch(e => alert(e.message));
        else signInWithEmailAndPassword(auth, m, p).catch(e => alert("อีเมลหรือรหัสผ่านผิดพลาด"));
    };

    window.triggerLogout = () => signOut(auth).then(() => location.reload());

    onAuthStateChanged(auth, async user => {
        if(user) {
            document.getElementById('auth-ui').style.display = 'none';
            document.getElementById('main-ui').style.display = 'block';
            document.getElementById('nav-right').style.display = 'flex';
            if(user.email === ADMIN_MAIL) document.getElementById('admin-panel').style.display = 'block';
            setupUserProfile(user);
            loadWatched(user.uid);
            loadData();
        } else {
            document.getElementById('auth-ui').style.display = 'block';
            document.getElementById('main-ui').style.display = 'none';
        }
    });

    async function setupUserProfile(user) {
        const uDoc = await getDoc(doc(db, "users", user.uid));
        let nick = user.email.split('@')[0], img = "https://upload.wikimedia.org/wikipedia/commons/0/0b/Netflix-avatar.png";
        if(uDoc.exists()) { nick = uDoc.data().nickname || nick; img = uDoc.data().avatar || img; }
        document.getElementById('user-display').innerHTML = `<div class="user-box" onclick="document.getElementById('profile-modal').style.display='flex'"><span>${nick}</span><img src="${img}" class="user-img"></div>`;
        document.getElementById('edit-nickname').value = nick;
        document.getElementById('edit-avatar').value = img;
    }

    // --- DATA LOADING ---
    async function loadData() {
        const snap = await getDocs(query(collection(db, "all_anime"), orderBy("created", "desc")));
        allData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        render(allData);
    }

    async function loadWatched(uid) {
        const q = query(collection(db, "user_watched"), where("uid", "==", uid), orderBy("timestamp", "desc"));
        const snap = await getDocs(q);
        const grid = document.getElementById('watched-grid'); grid.innerHTML = "";
        watchedListRaw = [];
        if(!snap.empty) {
            document.getElementById('watched-section').style.display = 'block';
            snap.forEach(d => {
                const data = d.data();
                watchedListRaw.push({id: d.id, key: `${data.mainTitle}|${data.seasonName}`});
                grid.innerHTML += `
                    <div class="card" style="scale:0.95;">
                        <button class="btn-clear-history" onclick="removeFromHistory('${d.id}')">✕</button>
                        <img src="${data.image}">
                        <div class="card-overlay"><div class="card-title">${data.mainTitle}<br><small style="color:#2ed573">${data.seasonName}</small></div></div>
                    </div>`;
            });
        }
    }

    // --- FUNCTIONS ---
    window.showOnlyWatched = () => {
        document.getElementById('main-content-area').style.display = 'none';
        document.getElementById('watched-section').style.display = 'block';
        document.getElementById('cat-label').innerText = "ประวัติการดูของคุณ";
    };

    window.showHome = () => {
        document.getElementById('main-content-area').style.display = 'block';
        document.getElementById('watched-section').style.display = 'block';
        render(allData);
    };

    function render(list) {
        const grid = document.getElementById('main-grid'), isAdmin = auth.currentUser?.email === ADMIN_MAIL;
        grid.innerHTML = "";
        list.forEach(item => {
            grid.innerHTML += `
                <div class="card">
                    <img src="${item.image}" onclick="openDetails('${item.id}')">
                    <div class="card-overlay" onclick="openDetails('${item.id}')"><div class="card-title">${item.title}</div></div>
                </div>`;
        });
    }

    window.handleSearch = () => {
        const q = document.getElementById('search-input').value.toLowerCase();
        render(allData.filter(x => x.title.toLowerCase().includes(q)));
    };

    window.filterCategory = (c) => {
        document.getElementById('main-content-area').style.display = 'block';
        render(allData.filter(x => x.category === c));
    };

    window.openDetails = (id) => {
        const item = allData.find(x => x.id === id);
        document.getElementById('modal-title').innerText = item.title;
        const list = document.getElementById('season-list'); list.innerHTML = "";
        const keys = watchedListRaw.map(x => x.key);
        if(item.seasons) {
            item.seasons.forEach(s => {
                const isWatched = keys.includes(`${item.title}|${s.name}`);
                list.innerHTML += `
                    <div class="season-card ${isWatched ? 'watched' : ''}" onclick="markAsWatched('${item.title}', '${s.name}', '${s.image}')">
                        ${isWatched ? '<div class="check-mark">✓</div>' : ''}
                        <img src="${s.image}" style="width:100%; aspect-ratio:2/3; object-fit:cover;">
                        <div style="padding:15px;">${s.name}</div>
                    </div>`;
            });
        }
        document.getElementById('detail-modal').style.display = 'flex';
    };

    window.markAsWatched = async (m, s, i) => {
        if(watchedListRaw.map(x => x.key).includes(`${m}|${s}`)) return;
        await addDoc(collection(db, "user_watched"), { uid: auth.currentUser.uid, mainTitle: m, seasonName: s, image: i, timestamp: new Date() });
        loadWatched(auth.currentUser.uid); closeModal('detail-modal');
    };

    window.removeFromHistory = async (id) => { if(confirm('ลบ?')) { await deleteDoc(doc(db, "user_watched", id)); loadWatched(auth.currentUser.uid); } };
    window.closeModal = (id) => document.getElementById(id).style.display = 'none';
    window.onscroll = () => { const n = document.getElementById('navbar'); window.pageYOffset > 50 ? n.classList.add('scrolled') : n.classList.remove('scrolled'); };
</script>
</body>
</html>
