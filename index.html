<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY HUB | v43 Real-time Complete</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --netflix-red: #E50914;
            --netflix-black: #141414;
            --nav-height: 70px;
            --card-width: 280px;
        }

        * { box-sizing: border-box; }
        body {
            font-family: 'Kanit', sans-serif;
            background-color: var(--netflix-black);
            color: white;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* --- NAVIGATION --- */
        nav {
            background: rgba(0,0,0,0.95);
            padding: 0 4%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: var(--nav-height);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .nav-left { display: flex; align-items: center; gap: 30px; }
        .nav-logo {
            color: var(--netflix-red);
            font-size: 2rem;
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
        }
        .nav-menu {
            display: flex;
            list-style: none;
            gap: 25px;
            padding: 0;
            margin: 0;
            cursor: pointer;
            color: #e5e5e5;
            font-size: 0.95rem;
        }
        .nav-right { display: flex; align-items: center; gap: 20px; }
        .search-box { width: 280px; height: 38px; }
        .search-box input {
            background: rgba(255,255,255,0.15);
            border: 1px solid #444;
            border-radius: 20px;
            padding: 0 20px;
            width: 100%;
            height: 100%;
            color: white;
            outline: none;
            font-size: 0.9rem;
        }

        /* --- AUTH: Large Card & White Link --- */
        .auth-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://assets.nflxext.com/ffe/siteui/vlv3/f8ca36a4-ac20-4af2-9645-092df8591476/be0195e3-4610-4f81-9993-47000780f2d7/TH-en-20220523-popsignuptwoweeks-perspective_alpha_website_large.jpg');
            background-size: cover;
        }
        .auth-card {
            width: 100%;
            max-width: 450px;
            background: rgba(0,0,0,0.85);
            padding: 60px;
            border-radius: 10px;
            text-align: center;
        }
        .auth-card h1 { font-size: 2.2rem; margin-bottom: 25px; text-align: left; }
        .auth-card input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            background: #333;
            border: none;
            border-radius: 5px;
            color: white;
            font-size: 1rem;
        }
        .btn-red {
            background: var(--netflix-red);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 5px;
            width: 100%;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
        }
        #auth-switch {
            margin-top: 30px;
            color: #8c8c8c;
            text-align: left;
            font-size: 1rem;
            cursor: pointer;
        }
        #auth-switch b { color: white; margin-left: 5px; } /* White Link */

        /* --- CONTENT GRID & CARDS --- */
        .container { padding: 100px 4% 50px; }
        .section-header { display: flex; align-items: center; gap: 15px; margin: 40px 0 25px; }
        .section-title { font-size: 1.6rem; font-weight: 500; margin: 0; }
        .title-line { height: 30px; width: 5px; background: var(--netflix-red); border-radius: 10px; }

        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(var(--card-width), 1fr));
            gap: 25px;
        }

        .card {
            position: relative;
            background: #181818;
            border-radius: 10px;
            overflow: hidden;
            aspect-ratio: 2/3;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .card:hover { transform: scale(1.05); z-index: 5; }
        .card img { width: 100%; height: 100%; object-fit: cover; }

        /* Title & Season Alignment */
        .card-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.95) 70%);
            padding: 50px 15px 15px;
            text-align: center;
        }
        .card-title { font-size: 1.1rem; font-weight: 500; display: block; margin-bottom: 5px; }
        .card-season { font-size: 0.85rem; color: #2ed573; display: block; font-weight: 300; }

        /* Real-time Check Badge */
        .check-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background: #2ed573;
            color: white;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            z-index: 100;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            border: 2px solid white;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn { 0% { transform: scale(0); } 100% { transform: scale(1); } }

        .btn-del-history {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(229, 9, 20, 0.9);
            color: white;
            border: none;
            border-radius: 5px;
            padding: 5px 10px;
            font-size: 0.75rem;
            z-index: 20;
            cursor: pointer;
        }

        /* --- ADMIN PANEL --- */
        #admin-panel { background: #222; padding: 30px; border-radius: 12px; margin-bottom: 40px; border: 1px solid #333; }
        .admin-row { display: grid; grid-template-columns: 2fr 2fr 1fr auto; gap: 15px; }

        /* --- MODALS --- */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            align-items: center;
            justify-content: center;
            z-index: 5000;
            padding: 20px;
        }
        .modal-content {
            background: #181818;
            width: 100%;
            max-width: 900px;
            padding: 40px;
            border-radius: 15px;
            position: relative;
        }
        .user-profile { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .user-avatar { width: 34px; height: 34px; border-radius: 4px; object-fit: cover; }
    </style>
</head>
<body>

<nav>
    <div class="nav-left">
        <a class="nav-logo" onclick="location.reload()">MY HUB</a>
        <ul class="nav-menu">
            <li onclick="showHome()">หน้าหลัก</li>
            <li onclick="filterCat('Anime')">อนิเมะ</li>
            <li onclick="filterCat('Movie')">หนัง</li>
            <li onclick="showOnlyWatched()" style="color:#2ed573;">ประวัติการดู</li>
        </ul>
    </div>
    <div class="nav-right" id="nav-right" style="display:none;">
        <div class="search-box"><input type="text" id="search-input" placeholder="ค้นหาชื่อเรื่อง..." onkeyup="handleSearch()"></div>
        <div id="profile-area"></div>
    </div>
</nav>

<div id="auth-ui" class="auth-wrapper">
    <div class="auth-card">
        <h1 id="auth-title">Sign In</h1>
        <input type="email" id="email" placeholder="อีเมล">
        <input type="password" id="password" placeholder="รหัสผ่าน">
        <button class="btn-red" onclick="runAuth()" id="auth-btn">เข้าสู่ระบบ</button>
        <p id="auth-switch" onclick="toggleAuth()">ยังไม่มีบัญชี? <b>สมัครสมาชิกที่นี่</b></p>
    </div>
</div>

<div id="main-ui" class="container" style="display:none;">
    <div id="admin-panel" style="display:none;">
        <h3 style="color:var(--netflix-red); margin-top:0;">จัดการเนื้อหา</h3>
        <div class="admin-row">
            <input type="text" id="adm-title" placeholder="ชื่อเรื่อง">
            <input type="text" id="adm-img" placeholder="URL ปก">
            <select id="adm-cat"><option value="Anime">Anime</option><option value="Movie">Movie</option><option value="Series">Series</option></select>
            <button class="btn-red" onclick="saveToDB()" style="margin:0; width:100px;">บันทึก</button>
        </div>
        <div id="season-inputs-area"></div>
        <button onclick="addSeasonField()" style="background:none; border:1px dashed #555; color:#aaa; width:100%; padding:10px; margin-top:10px; cursor:pointer;">+ เพิ่มซีซันย่อย</button>
    </div>

    <div id="watched-section" style="display:none;">
        <div class="section-header"><div class="title-line"></div><h2 class="section-title" style="color:#2ed573;">รับชมต่อ</h2></div>
        <div class="content-grid" id="watched-grid"></div>
    </div>

    <div id="main-area">
        <div class="section-header"><div class="title-line"></div><h2 class="section-title">รายการแนะนำ</h2></div>
        <div class="content-grid" id="main-grid"></div>
    </div>
</div>

<div id="profile-modal" class="modal">
    <div class="modal-content" style="max-width:400px; text-align:center;">
        <h2>โปรไฟล์</h2>
        <input type="text" id="p-nick" placeholder="ชื่อเล่น">
        <input type="text" id="p-ava" placeholder="URL รูปโปรไฟล์">
        <button class="btn-red" onclick="saveProfile()">บันทึก</button>
        <button class="btn-red" style="background:#333;" onclick="handleLogout()">Logout</button>
        <p onclick="closeModal('profile-modal')" style="cursor:pointer; color:#888; margin-top:15px;">ปิดหน้าต่าง</p>
    </div>
</div>

<div id="detail-modal" class="modal">
    <div class="modal-content">
        <h2 id="m-title" style="margin-top:0;"></h2>
        <div id="m-list" class="content-grid" style="grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));"></div>
        <button class="btn-red" onclick="closeModal('detail-modal')" style="width:100px; margin-top:30px;">ปิด</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, collection, addDoc, getDocs, query, where, orderBy, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyADNWKhUNqKyF19d-2WBHsHQ1uaZIAN8Bg", authDomain: "myanimeweb-1e859.firebaseapp.com",
        projectId: "myanimeweb-1e859", storageBucket: "myanimeweb-1e859.firebasestorage.app",
        messagingSenderId: "1018346930735", appId: "1:1018346930735:web:dd2d015e2a1f0c628b3cda"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const ADMIN = "tungpanithan1931@gmail.com";

    let allData = [], watchedList = [], isReg = false, editId = null;

    // --- AUTH LOGIC ---
    window.toggleAuth = () => {
        isReg = !isReg;
        document.getElementById('auth-title').innerText = isReg ? "Sign Up" : "Sign In";
        document.getElementById('auth-btn').innerText = isReg ? "สมัครสมาชิก" : "เข้าสู่ระบบ";
        document.getElementById('auth-switch').innerHTML = isReg ? "มีบัญชีอยู่แล้ว? <b>เข้าสู่ระบบ</b>" : "ยังไม่มีบัญชี? <b>สมัครสมาชิกที่นี่</b>";
    };
    window.runAuth = () => {
        const m = document.getElementById('email').value, p = document.getElementById('password').value;
        if(isReg) createUserWithEmailAndPassword(auth, m, p).catch(e => alert(e.message));
        else signInWithEmailAndPassword(auth, m, p).catch(e => alert("อีเมลหรือรหัสผ่านผิด"));
    };
    window.handleLogout = () => signOut(auth).then(() => location.reload());

    onAuthStateChanged(auth, async user => {
        if(user) {
            document.getElementById('auth-ui').style.display = 'none'; document.getElementById('main-ui').style.display = 'block';
            document.getElementById('nav-right').style.display = 'flex';
            if(user.email === ADMIN) document.getElementById('admin-panel').style.display = 'block';
            loadData(); loadWatched(user.uid); loadProfile(user.uid, user.email);
        } else { document.getElementById('auth-ui').style.display = 'flex'; document.getElementById('main-ui').style.display = 'none'; }
    });

    // --- PROFILE ---
    async function loadProfile(uid, email) {
        const d = await getDoc(doc(db, "users", uid));
        let n = email.split('@')[0], a = "https://upload.wikimedia.org/wikipedia/commons/0/0b/Netflix-avatar.png";
        if(d.exists()) { n = d.data().nickname || n; a = d.data().avatar || a; }
        document.getElementById('profile-area').innerHTML = `<div class="user-profile" onclick="openProfileModal('${n}','${a}')"><span>${n}</span><img src="${a}" class="user-avatar"></div>`;
    }
    window.openProfileModal = (n, a) => { document.getElementById('p-nick').value = n; document.getElementById('p-ava').value = a; document.getElementById('profile-modal').style.display = 'flex'; };
    window.saveProfile = async () => { await setDoc(doc(db, "users", auth.currentUser.uid), { nickname: document.getElementById('p-nick').value, avatar: document.getElementById('p-ava').value }); location.reload(); };

    // --- REAL-TIME DATA & RENDERING ---
    async function loadData() { const s = await getDocs(query(collection(db, "all_anime"), orderBy("created", "desc"))); allData = s.docs.map(d => ({ id: d.id, ...d.data() })); renderGrid(allData); }
    
    async function loadWatched(uid) {
        const s = await getDocs(query(collection(db, "user_watched"), where("uid", "==", uid), orderBy("timestamp", "desc")));
        const g = document.getElementById('watched-grid'); g.innerHTML = ""; watchedList = [];
        if(!s.empty) {
            document.getElementById('watched-section').style.display = 'block';
            s.forEach(d => {
                const data = d.data(); watchedList.push({ id: d.id, key: `${data.mainTitle}|${data.seasonName}` });
                g.innerHTML += `
                    <div class="card" style="scale:0.95;">
                        <button class="btn-del-history" onclick="deleteHistory('${d.id}')">ลบ</button>
                        <img src="${data.image}">
                        <div class="card-info"><span class="card-title">${data.mainTitle}</span><span class="card-season">${data.seasonName}</span></div>
                    </div>`;
            });
        } else { document.getElementById('watched-section').style.display = 'none'; }
        renderGrid(allData);
    }

    window.deleteHistory = async (id) => { if(confirm("ลบประวัติการดู?")) { await deleteDoc(doc(db, "user_watched", id)); loadWatched(auth.currentUser.uid); } };

    function renderGrid(list) {
        const g = document.getElementById('main-grid'); g.innerHTML = "";
        const isAdmin = auth.currentUser?.email === ADMIN;
        list.forEach(item => {
            const watchedCount = watchedList.filter(x => x.key.startsWith(item.title + "|")).length;
            const total = item.seasons?.length || 0;
            const done = total > 0 && watchedCount >= total;
            g.innerHTML += `
                <div class="card">
                    ${done ? '<div class="check-badge">✓</div>' : ''}
                    ${isAdmin ? `<button onclick="editItem('${item.id}')" style="position:absolute; top:10px; right:10px; z-index:20; background:#007bff; color:white; border:none; padding:5px; border-radius:4px; font-size:10px;">แก้ไข</button>` : ''}
                    <img src="${item.image}" onclick="openDetail('${item.id}')">
                    <div class="card-info" onclick="openDetail('${item.id}')"><span class="card-title">${item.title}</span><span class="card-season">${total} ซีซัน</span></div>
                </div>`;
        });
    }

    // --- REAL-TIME CHECKMARK SYSTEM ---
    window.openDetail = (id) => {
        const item = allData.find(x => x.id === id); document.getElementById('m-title').innerText = item.title;
        const list = document.getElementById('m-list'); list.innerHTML = "";
        item.seasons?.forEach((s, idx) => {
            const isW = watchedList.some(x => x.key === `${item.title}|${s.name}`);
            list.innerHTML += `
                <div class="card" onclick="markRealtime('${item.title}','${s.name}','${s.image}',${idx})">
                    <div id="badge-${idx}" class="check-badge" style="display: ${isW ? 'flex' : 'none'}">✓</div>
                    <img src="${s.image}">
                    <div class="card-info"><span class="card-title" style="font-size:0.9rem;">${s.name}</span></div>
                </div>`;
        });
        document.getElementById('detail-modal').style.display = 'flex';
    };

    window.markRealtime = async (m, s, i, idx) => {
        const badge = document.getElementById(`badge-${idx}`);
        if(badge.style.display === 'flex') return;
        badge.style.display = 'flex'; // Show Green Immediately!
        await addDoc(collection(db, "user_watched"), { uid: auth.currentUser.uid, mainTitle: m, seasonName: s, image: i, timestamp: new Date() });
        watchedList.push({ id: 'temp', key: `${m}|${s}` });
        renderGrid(allData); // Sync background grid
    };

    // --- ADMIN ACTIONS ---
    window.addSeasonField = (n="", i="") => {
        const d = document.createElement('div'); d.className = "admin-row"; d.style.marginTop = "10px";
        d.innerHTML = `<input type="text" class="sn" placeholder="ชื่อซีซัน" value="${n}"><input type="text" class="si" placeholder="URL ปก" value="${i}"><button onclick="this.parentElement.remove()" style="background:red; color:white; border:none; border-radius:5px;">X</button>`;
        document.getElementById('season-inputs-area').appendChild(d);
    };
    window.saveToDB = async () => {
        const sns = document.querySelectorAll('.sn'), sis = document.querySelectorAll('.si'); let sArray = [];
        sns.forEach((x, i) => { if(x.value) sArray.push({ name: x.value, image: sis[i].value }); });
        const p = { title: document.getElementById('adm-title').value, image: document.getElementById('adm-img').value, category: document.getElementById('adm-cat').value, seasons: sArray, created: new Date() };
        if(editId) await updateDoc(doc(db, "all_anime", editId), p); else await addDoc(collection(db, "all_anime"), p); location.reload();
    };
    window.editItem = (id) => {
        editId = id; const item = allData.find(x => x.id === id);
        document.getElementById('adm-title').value = item.title; document.getElementById('adm-img').value = item.image; document.getElementById('adm-cat').value = item.category;
        document.getElementById('season-inputs-area').innerHTML = ""; item.seasons?.forEach(s => addSeasonField(s.name, s.image)); window.scrollTo(0,0);
    };

    window.handleSearch = () => { const q = document.getElementById('search-input').value.toLowerCase(); renderGrid(allData.filter(x => x.title.toLowerCase().includes(q))); };
    window.filterCat = (c) => renderGrid(allData.filter(x => x.category === c));
    window.showOnlyWatched = () => { document.getElementById('main-area').style.display='none'; document.getElementById('watched-section').style.display='block'; };
    window.showHome = () => { document.getElementById('main-area').style.display='block'; renderGrid(allData); };
    window.closeModal = (id) => document.getElementById(id).style.display = 'none';
</script>
</body>
</html>
