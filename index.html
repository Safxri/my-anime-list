<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY HUB | Premium Edition v11</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --netflix-red: #E50914; --netflix-black: #141414; --card-bg: #181818; --nav-height: 70px; }
        * { box-sizing: border-box; }
        body { font-family: 'Kanit', sans-serif; background-color: var(--netflix-black); color: white; margin: 0; padding: 0; }

        /* --- NAVBAR: จัดวางตามรูป image_140a75.png และ image_14e452.png --- */
        nav { 
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 100%); 
            padding: 0 4%; display: flex; align-items: center; justify-content: space-between; 
            height: var(--nav-height); position: fixed; top: 0; width: 100%; z-index: 1000; transition: 0.5s; 
        }
        nav.scrolled { background-color: var(--netflix-black); }

        .nav-left { display: flex; align-items: center; gap: 35px; }
        .nav-logo { color: var(--netflix-red); font-size: 1.8rem; font-weight: 700; text-decoration: none; letter-spacing: 1px; }
        
        .nav-menu { display: flex; list-style: none; gap: 20px; padding: 0; margin: 0; }
        .nav-menu li { font-size: 1rem; color: #e5e5e5; cursor: pointer; transition: 0.3s; font-weight: 400; }
        .nav-menu li:hover { color: #b3b3b3; }

        /* กลุ่มทางขวา: Search + Profile */
        .nav-right-group { display: flex; align-items: center; gap: 25px; }

        .search-container { position: relative; width: 280px; transition: 0.3s; }
        .search-container input { 
            background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.3); border-radius: 4px; 
            padding: 7px 10px 7px 35px; width: 100%; color: white; outline: none; font-size: 0.9rem;
        }
        .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #ccc; font-size: 0.9rem; }

        .user-profile-box { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .user-nickname { font-size: 0.95rem; font-weight: 500; color: white; white-space: nowrap; }
        .user-img { width: 34px; height: 34px; border-radius: 4px; object-fit: cover; }

        /* --- AUTH CARD --- */
        .auth-overlay { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: url('https://assets.nflxext.com/ffe/siteui/vlv3/f80e569d-ed20-4054-9a84-f31d0523997e/aec85f52-4424-4f9e-ad72-463836d54238/TH-en-20220704-popsignuptwoweeks-perspective_alpha_website_large.jpg'); background-size: cover; }
        .auth-card { background: rgba(0,0,0,0.75); padding: 60px; border-radius: 8px; width: 100%; max-width: 450px; }
        .auth-card h1 { margin-bottom: 28px; font-size: 2rem; }
        .auth-card input { width: 100%; padding: 14px; margin-bottom: 16px; background: #333; border: none; border-radius: 4px; color: white; font-size: 1rem; }
        .btn-auth { width: 100%; padding: 14px; background: var(--netflix-red); color: white; border: none; border-radius: 4px; font-weight: 600; cursor: pointer; font-size: 1rem; margin-top: 20px; }

        /* --- CONTENT --- */
        .main-container { padding: 100px 4% 40px; }
        .section-title { font-size: 1.4rem; margin-bottom: 20px; font-weight: 500; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .card { background: #181818; border-radius: 4px; overflow: hidden; transition: 0.3s; cursor: pointer; }
        .card:hover { transform: scale(1.05); }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        
        #admin-panel { display: none; margin: 90px 4% 0; padding: 20px; border: 1px solid #444; border-radius: 8px; background: #111; }

        /* Modal */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-box { background: #181818; width: 90%; max-width: 500px; padding: 30px; border-radius: 10px; position: relative; }
    </style>
</head>
<body>

<nav id="navbar">
    <div class="nav-left">
        <a href="#" class="nav-logo" onclick="location.reload()">MY HUB</a>
        <ul class="nav-menu">
            <li onclick="filterCategory('All')">หน้าหลัก</li>
            <li onclick="filterCategory('Movie')">ภาพยนตร์</li>
            <li onclick="filterCategory('Series')">ซีรีส์</li>
            <li onclick="filterCategory('Anime')">อนิเมะ</li>
        </ul>
    </div>
    
    <div class="nav-right-group" id="nav-right" style="display:none;">
        <div class="search-container">
            <span class="search-icon">🔍</span>
            <input type="text" id="search-input" placeholder="ค้นหาชื่อเรื่อง..." onkeyup="handleSearch()">
        </div>
        <div id="user-display"></div>
    </div>
</nav>

<div id="admin-panel">
    <h4 style="color:var(--netflix-red); margin-top:0;">Admin Console</h4>
    <div style="display:grid; grid-template-columns: 2fr 2fr 1fr auto; gap:10px;">
        <input type="text" id="adm-title" placeholder="ชื่อเรื่อง">
        <input type="text" id="adm-img" placeholder="URL รูปปก">
        <select id="adm-cat" style="background:#333; color:white; border:none; padding:10px; border-radius:4px;">
            <option value="Anime">Anime</option>
            <option value="Movie">Movie</option>
            <option value="Series">Series</option>
        </select>
        <button onclick="addToDatabase()" class="btn-auth" style="margin:0; padding:10px 20px;">เพิ่ม</button>
    </div>
    <div id="season-fields" style="margin-top:10px;"></div>
    <button onclick="addSeasonInput()" style="background:#444; color:white; border:none; padding:5px 10px; margin-top:10px; border-radius:4px; cursor:pointer;">+ ซีซัน</button>
</div>

<div id="auth-ui" class="auth-overlay">
    <div class="auth-card">
        <h1 id="auth-header">เข้าสู่ระบบ</h1>
        <input type="email" id="email" placeholder="อีเมล">
        <input type="password" id="password" placeholder="รหัสผ่าน">
        <button class="btn-auth" onclick="runAuth()" id="main-auth-btn">Sign In</button>
        <p style="color:#737373; margin-top:20px;">
            <span id="auth-tip-text">ยังไม่มีบัญชีใช่ไหม?</span> 
            <a href="javascript:void(0)" onclick="toggleAuth()" style="color:white; text-decoration:none;" id="auth-link">สมัครตอนนี้</a>
        </p>
    </div>
</div>

<div id="content-ui" class="main-container" style="display:none;">
    <h2 class="section-title" id="display-title">รายการแนะนำ</h2>
    <div class="grid" id="main-grid"></div>
    
    <h2 class="section-title" style="margin-top:60px; color:#666;">ประวัติการรับชม</h2>
    <div class="grid" id="history-grid"></div>
</div>

<div id="profile-modal" class="modal">
    <div class="modal-box">
        <h3>ตั้งค่าโปรไฟล์</h3>
        <input type="text" id="edit-nickname" placeholder="ชื่อเล่น">
        <input type="text" id="edit-avatar" placeholder="URL รูปโปรไฟล์">
        <button class="btn-auth" onclick="updateProfile()">บันทึก</button>
        <button class="btn-auth" style="background:#333; margin-top:10px;" onclick="logOut()">ออกจากระบบ</button>
        <button onclick="closeModal('profile-modal')" style="position:absolute; top:15px; right:15px; background:none; border:none; color:white; font-size:1.5rem; cursor:pointer;">&times;</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, collection, addDoc, getDocs, query, where, orderBy, updateDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyADNWKhUNqKyF19d-2WBHsHQ1uaZIAN8Bg",
        authDomain: "myanimeweb-1e859.firebaseapp.com",
        projectId: "myanimeweb-1e859",
        storageBucket: "myanimeweb-1e859.firebasestorage.app",
        messagingSenderId: "1018346930735",
        appId: "1:1018346930735:web:dd2d015e2a1f0c628b3cda"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const ADMIN_MAIL = "tungpanithan1931@gmail.com";

    let isRegister = false;
    let allData = [];

    // --- AUTH ---
    window.toggleAuth = () => {
        isRegister = !isRegister;
        document.getElementById('auth-header').innerText = isRegister ? "สมัครสมาชิก" : "เข้าสู่ระบบ";
        document.getElementById('main-auth-btn').innerText = isRegister ? "Sign Up" : "Sign In";
        document.getElementById('auth-tip-text').innerText = isRegister ? "มีบัญชีอยู่แล้ว?" : "ยังไม่มีบัญชีใช่ไหม?";
        document.getElementById('auth-link').innerText = isRegister ? "เข้าสู่ระบบ" : "สมัครตอนนี้";
    };

    window.runAuth = () => {
        const mail = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        if(isRegister) createUserWithEmailAndPassword(auth, mail, pass).catch(e => alert(e.message));
        else signInWithEmailAndPassword(auth, mail, pass).catch(e => alert(e.message));
    };

    // --- PROFILE ---
    async function setupUser(user) {
        const snap = await getDoc(doc(db, "users", user.uid));
        let data = { nick: user.email.split('@')[0], img: "https://upload.wikimedia.org/wikipedia/commons/0/0b/Netflix-avatar.png" };
        if(snap.exists()) data = { nick: snap.data().nickname || data.nick, img: snap.data().avatar || data.img };
        
        document.getElementById('user-display').innerHTML = `
            <div class="user-profile-box" onclick="openProfile()">
                <span class="user-nickname">${data.nick}</span>
                <img src="${data.img}" class="user-img">
            </div>
        `;
        document.getElementById('edit-nickname').value = data.nick;
        document.getElementById('edit-avatar').value = data.img;
    }

    window.openProfile = () => document.getElementById('profile-modal').style.display = 'flex';
    window.updateProfile = async () => {
        await setDoc(doc(db, "users", auth.currentUser.uid), { nickname: document.getElementById('edit-nickname').value, avatar: document.getElementById('edit-avatar').value }, { merge: true });
        location.reload();
    };

    // --- UI & DATA ---
    async function loadContent(uid) {
        const snap = await getDocs(query(collection(db, "all_anime"), orderBy("created", "desc")));
        allData = []; snap.forEach(d => allData.push({ id: d.id, ...d.data() }));
        render(allData);
        
        // History
        const hSnap = await getDocs(query(collection(db, "user_watched"), where("uid", "==", uid), orderBy("timestamp", "desc")));
        const hGrid = document.getElementById('history-grid'); hGrid.innerHTML = "";
        hSnap.forEach(d => {
            const data = d.data();
            hGrid.innerHTML += `<div class="card" style="opacity:0.6;"><img src="${data.image}"><div style="padding:10px;font-size:0.8rem;">${data.mainTitle}<br><span style="color:#2ed573">${data.seasonName}</span></div></div>`;
        });
    }

    function render(list) {
        const grid = document.getElementById('main-grid'); grid.innerHTML = "";
        list.forEach(item => {
            grid.innerHTML += `
                <div class="card" onclick="alert('เลือกซีซันได้ที่หน้า Admin หรือระบบ Detail (กำลังพัฒนา)')">
                    <img src="${item.image}">
                    <div style="padding:10px;">
                        <small style="color:var(--netflix-red)">${item.category}</small>
                        <div style="font-size:0.9rem; font-weight:500; margin-top:4px;">${item.title}</div>
                    </div>
                </div>`;
        });
    }

    window.handleSearch = () => {
        const q = document.getElementById('search-input').value.toLowerCase();
        render(allData.filter(x => x.title.toLowerCase().includes(q)));
    };

    window.filterCategory = (c) => {
        document.getElementById('display-title').innerText = c === 'All' ? 'รายการแนะนำ' : c;
        render(c === 'All' ? allData : allData.filter(x => x.category === c));
    };

    // --- ADMIN ---
    window.addSeasonInput = () => {
        const div = document.createElement('div');
        div.innerHTML = `<input type="text" class="s-n" placeholder="SS1" style="width:30%"><input type="text" class="s-i" placeholder="URL ปก" style="width:60%"><button onclick="this.parentElement.remove()">X</button>`;
        document.getElementById('season-fields').appendChild(div);
    };

    window.addToDatabase = async () => {
        const title = document.getElementById('adm-title').value;
        const image = document.getElementById('adm-img').value;
        const category = document.getElementById('adm-cat').value;
        const sn = document.querySelectorAll('.s-n'); const si = document.querySelectorAll('.s-i');
        let seasons = []; sn.forEach((v, i) => { if(v.value) seasons.push({ name: v.value, image: si[i].value || image }); });
        await addDoc(collection(db, "all_anime"), { title, image, category, seasons, created: new Date() });
        location.reload();
    };

    // --- SYSTEM ---
    onAuthStateChanged(auth, user => {
        if(user) {
            document.getElementById('auth-ui').style.display = 'none';
            document.getElementById('content-ui').style.display = 'block';
            document.getElementById('nav-right').style.display = 'flex';
            if(user.email === ADMIN_MAIL) document.getElementById('admin-panel').style.display = 'block';
            setupUser(user); loadContent(user.uid);
        } else {
            document.getElementById('auth-ui').style.display = 'flex';
            document.getElementById('content-ui').style.display = 'none';
            document.getElementById('nav-right').style.display = 'none';
        }
    });

    window.closeModal = (id) => document.getElementById(id).style.display = 'none';
    window.logOut = () => signOut(auth).then(() => location.reload());
    window.onscroll = () => {
        const nav = document.getElementById('navbar');
        window.pageYOffset > 50 ? nav.classList.add('scrolled') : nav.classList.remove('scrolled');
    };
</script>
</body>
</html>
