<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Tracker | รวมพลคนรักอนิเมะ</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --netflix-red: #E50914;
            --netflix-black: #141414;
            --netflix-dark-gray: #181818;
            --text-color: #FFFFFF;
            --text-muted: #B3B3B3;
            --card-border-radius: 4px;
            --transition-speed: 0.3s;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background-color: var(--netflix-black);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        /* --- NAVIGATION --- */
        nav {
            background-color: rgba(0, 0, 0, 0.7);
            padding: 1rem 4%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            box-sizing: border-box;
            transition: background-color var(--transition-speed);
        }
        nav.scrolled { background-color: var(--netflix-black); }

        #nav-logo {
            font-size: 2rem;
            font-weight: bold;
            color: var(--netflix-red);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-decoration: none;
        }

        #user-info {
            font-size: 0.9rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn-logout {
            background-color: var(--netflix-red);
            border: none;
            color: white;
            padding: 8px 15px;
            border-radius: 2px;
            cursor: pointer;
            font-family: 'Kanit';
        }

        /* --- CONTAINER --- */
        .container {
            max-width: 100%;
            margin-top: 80px;
            padding: 20px 4%;
            box-sizing: border-box;
        }

        h3 { font-weight: 500; font-size: 1.4rem; margin: 40px 0 20px; }

        /* --- ANIME GRID & CARDS --- */
        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
        }

        .anime-card {
            background-color: var(--netflix-dark-gray);
            border-radius: var(--card-border-radius);
            overflow: hidden;
            transition: transform var(--transition-speed);
            position: relative;
        }
        
        .anime-card:hover { transform: scale(1.05); z-index: 10; }

        .anime-card img {
            width: 100%;
            height: 260px;
            object-fit: cover;
        }

        .anime-info {
            padding: 10px;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            position: absolute;
            bottom: 0;
            width: 100%;
            box-sizing: border-box;
        }

        .anime-info h4 { margin: 0; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .btn {
            border: none;
            padding: 8px;
            border-radius: 2px;
            cursor: pointer;
            font-family: 'Kanit';
            font-weight: 500;
            width: 100%;
            margin-top: 10px;
            transition: 0.2s;
        }

        .btn-add { background-color: var(--netflix-red); color: white; }
        .btn-watched { background-color: #2ed573; color: white; cursor: default; }

        /* --- AUTH SECTION --- */
        #auth-section {
            text-align: center;
            margin: 10vh auto;
            background-color: rgba(0,0,0,0.75);
            padding: 60px;
            max-width: 400px;
            border-radius: 4px;
        }

        input {
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 4px;
            border: 1px solid #333;
            background-color: #333;
            color: white;
            width: 100%;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

<nav id="navbar">
    <a href="#" id="nav-logo">ANIME TRACKER</a>
    <div id="user-info">กำลังโหลด...</div>
</nav>

<div class="container">
    <div id="auth-section">
        <h2 style="font-size: 2rem; margin-bottom: 30px;">เข้าสู่ระบบ</h2>
        <input type="email" id="email" placeholder="อีเมล">
        <input type="password" id="password" placeholder="รหัสผ่าน">
        <button class="btn btn-add" style="padding: 15px;" onclick="handleLogin()">เข้าสู่ระบบ</button>
        <button class="btn" style="background:#333; color:white; padding: 15px; margin-top: 10px;" onclick="handleSignUp()">สมัครสมาชิกใหม่</button>
    </div>

    <div id="main-content" style="display: none;">
        <h3>✨ อนิเมะแนะนำสำหรับคุณ</h3>
        <div class="anime-grid" id="admin-list"></div>

        <hr style="margin: 60px 0; border: 0; border-top: 1px solid #333;">

        <h3>✅ เรื่องที่ฉันดูจบแล้ว</h3>
        <div class="anime-grid" id="my-watched-list"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyADNWKhUNqKyF19d-2WBHsHQ1uaZIAN8Bg",
        authDomain: "myanimeweb-1e859.firebaseapp.com",
        projectId: "myanimeweb-1e859",
        storageBucket: "myanimeweb-1e859.firebasestorage.app",
        messagingSenderId: "1018346930735",
        appId: "1:1018346930735:web:dd2d015e2a1f0c628b3cda",
        measurementId: "G-0JZN53NYFD"
    };
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let watchedTitles = [];

    // --- AUTH FUNCTIONS ---
    window.handleSignUp = async () => {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        try {
            await createUserWithEmailAndPassword(auth, email, password);
            alert("สมัครสมาชิกสำเร็จ!");
        } catch (e) { alert("เกิดข้อผิดพลาด: " + e.message); }
    };

    window.handleLogin = async () => {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        try {
            await signInWithEmailAndPassword(auth, email, password);
        } catch (e) { alert("อีเมลหรือรหัสผ่านไม่ถูกต้อง"); }
    };

    window.logout = () => signOut(auth);

    // --- DATA FUNCTIONS ---
    async function loadAdminAnime() {
        const querySnapshot = await getDocs(collection(db, "all_anime"));
        const listDiv = document.getElementById('admin-list');
        listDiv.innerHTML = "";
        
        querySnapshot.forEach((doc) => {
            const data = doc.data();
            const isAlreadyWatched = watchedTitles.includes(data.title);

            listDiv.innerHTML += `
                <div class="anime-card">
                    <img src="${data.image}">
                    <div class="anime-info">
                        <h4>${data.title}</h4>
                        ${isAlreadyWatched 
                            ? `<button class="btn btn-watched" disabled>ดูจบแล้ว ✅</button>` 
                            : `<button class="btn btn-add" onclick="markAsWatched('${data.title}', '${data.image}')">ดูจบแล้ว</button>`
                        }
                    </div>
                </div>`;
        });
    }

    async function loadUserWatched(uid) {
        const q = query(collection(db, "user_watched"), where("uid", "==", uid));
        const querySnapshot = await getDocs(q);
        const listDiv = document.getElementById('my-watched-list');
        listDiv.innerHTML = "";
        watchedTitles = [];
        
        querySnapshot.forEach((doc) => {
            const data = doc.data();
            watchedTitles.push(data.animeName);
            listDiv.innerHTML += `
                <div class="anime-card">
                    <img src="${data.image}">
                    <div class="anime-info"><h4>${data.animeName} ✅</h4></div>
                </div>`;
        });
        loadAdminAnime();
    }

    // --- STATE CHECK ---
    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            document.getElementById('user-info').innerHTML = `<span>${user.email}</span> <button class="btn-logout" onclick="logout()">ออกระบบ</button>`;
            loadUserWatched(user.uid);
        } else {
            document.getElementById('auth-section').style.display = 'block';
            document.getElementById('main-content').style.display = 'none';
            document.getElementById('user-info').innerText = "กรุณาล็อกอิน";
        }
    });

    window.markAsWatched = async (title, image) => {
        const user = auth.currentUser;
        if (!user || watchedTitles.includes(title)) return;

        try {
            await addDoc(collection(db, "user_watched"), {
                uid: user.uid,
                animeName: title,
                image: image,
                timestamp: new Date()
            });
            loadUserWatched(user.uid);
        } catch (e) { console.error(e); }
    };

    window.onscroll = () => {
        const nav = document.getElementById('navbar');
        window.pageYOffset > 20 ? nav.classList.add("scrolled") : nav.classList.remove("scrolled");
    };
</script>
</body>
</html>
