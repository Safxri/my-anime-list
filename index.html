<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY HUB | v48 Fixed Real-time Sync</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --netflix-red: #E50914;
            --netflix-black: #141414;
            --glass-bg: rgba(30, 30, 30, 0.95);
            --card-radius: 12px;
            --nav-height: 70px;
        }

        * { box-sizing: border-box; }
        body {
            font-family: 'Kanit', sans-serif;
            background-color: var(--netflix-black);
            color: white;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* --- NAVIGATION --- */
        nav {
            background: rgba(0,0,0,0.95);
            padding: 0 4%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: var(--nav-height);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .nav-left { display: flex; align-items: center; gap: 30px; }
        .nav-logo { color: var(--netflix-red); font-size: 2rem; font-weight: 700; text-decoration: none; cursor: pointer; }
        .nav-menu { display: flex; list-style: none; gap: 25px; padding: 0; margin: 0; cursor: pointer; color: #aaa; font-size: 0.95rem; }
        .nav-menu li:hover { color: white; }

        .nav-right { display: flex; align-items: center; gap: 20px; }
        .search-box input {
            background: rgba(255,255,255,0.1);
            border: 1px solid #444;
            border-radius: 20px;
            padding: 10px 20px;
            color: white;
            width: 250px;
            outline: none;
        }

        /* --- AUTH: 450px Card --- */
        .auth-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://assets.nflxext.com/ffe/siteui/vlv3/f8ca36a4-ac20-4af2-9645-092df8591476/be0195e3-4610-4f81-9993-47000780f2d7/TH-en-20220523-popsignuptwoweeks-perspective_alpha_website_large.jpg');
            background-size: cover;
        }
        .auth-card {
            width: 450px;
            background: rgba(0,0,0,0.85);
            padding: 60px;
            border-radius: 10px;
        }
        .auth-card input { width: 100%; padding: 15px; margin-bottom: 15px; background: #333; border: none; color: white; border-radius: 5px; }
        .btn-red { background: var(--netflix-red); color: white; border: none; padding: 15px; border-radius: 5px; width: 100%; cursor: pointer; font-weight: 600; font-size: 1rem; }
        .auth-switch { margin-top: 30px; color: #8c8c8c; cursor: pointer; }
        .auth-switch b { color: white; }

        /* --- CONTENT GRID & CARDS --- */
        .container { padding: 100px 4% 50px; }
        .section-header { display: flex; align-items: center; gap: 15px; margin: 40px 0 25px; }
        .title-line { height: 30px; width: 5px; background: var(--netflix-red); border-radius: 10px; }
        .section-title { font-size: 1.6rem; font-weight: 500; }

        .content-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        .card {
            position: relative; background: #181818; border-radius: var(--card-radius);
            overflow: hidden; aspect-ratio: 2/3; cursor: pointer; transition: 0.4s ease;
        }
        .card:hover { transform: scale(1.05); z-index: 10; box-shadow: 0 15px 30px rgba(0,0,0,0.8); }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        
        .card-info {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.95) 75%);
            padding: 50px 15px 15px; text-align: center;
        }
        .card-title { font-size: 1.1rem; font-weight: 500; display: block; margin-bottom: 4px; }
        .card-season { color: #2ed573; font-size: 0.85rem; font-weight: 300; display: block; }

        /* Green Check Badge */
        .check-badge {
            position: absolute; top: 15px; left: 15px; background: #2ed573;
            color: white; border-radius: 50%; width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; border: 2px solid white; z-index: 100;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            animation: popCheck 0.4s forwards;
        }
        @keyframes popCheck { 0% { transform: scale(0); } 100% { transform: scale(1); } }

        /* --- ADMIN PANEL --- */
        #admin-panel { background: var(--glass-bg); padding: 30px; border-radius: var(--card-radius); margin-bottom: 40px; border: 1px solid rgba(255,255,255,0.1); }
        .admin-row { display: grid; grid-template-columns: 2fr 2fr 1fr auto; gap: 15px; margin-bottom: 12px; }
        .admin-row input, .admin-row select { background: #222; border: 1px solid #444; color: white; padding: 12px; border-radius: 8px; outline: none; }

        /* --- PREMIUM MODAL --- */
        .modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92);
            align-items: center; justify-content: center; z-index: 5000; backdrop-filter: blur(10px);
        }
        .modal-content {
            background: #1a1a1a; width: 90%; max-width: 450px; padding: 50px;
            border-radius: 25px; position: relative; text-align: center;
            border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 30px 60px rgba(0,0,0,0.9);
        }
        .close-btn { position: absolute; top: 25px; right: 25px; font-size: 1.8rem; cursor: pointer; color: #666; }

        .user-profile { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .user-avatar { width: 36px; height: 36px; border-radius: 6px; object-fit: cover; }
    </style>
</head>
<body>

<nav>
    <div class="nav-left">
        <a class="nav-logo" onclick="location.reload()">MY HUB</a>
        <ul class="nav-menu">
            <li onclick="window.showHome()">หน้าหลัก</li>
            <li onclick="window.filterCat('Anime')">อนิเมะ</li>
            <li onclick="window.filterCat('Movie')">หนัง</li>
        </ul>
    </div>
    <div class="nav-right" id="nav-right" style="display:none;">
        <div class="search-box"><input type="text" id="search-input" placeholder="ค้นหาชื่อเรื่อง..." onkeyup="window.handleSearch()"></div>
        <div id="profile-area"></div>
    </div>
</nav>

<div id="auth-ui" class="auth-wrapper">
    <div class="auth-card">
        <h1 id="auth-title">Sign In</h1>
        <input type="email" id="email" placeholder="อีเมล">
        <input type="password" id="password" placeholder="รหัสผ่าน">
        <button class="btn-red" onclick="window.runAuth()" id="auth-btn">เข้าสู่ระบบ</button>
        <p class="auth-switch" onclick="window.toggleAuth()">ยังไม่มีบัญชีใช่ไหม? <b>สมัครสมาชิกที่นี่</b></p>
    </div>
</div>

<div id="main-ui" class="container" style="display:none;">
    <div id="admin-panel" style="display:none;">
        <h3 style="color:var(--netflix-red); margin-top:0;">ADMIN PANEL</h3>
        <div class="admin-row">
            <input type="text" id="adm-title" placeholder="ชื่อเรื่อง">
            <input type="text" id="adm-img" placeholder="URL รูปปก">
            <select id="adm-cat"><option value="Anime">Anime</option><option value="Movie">Movie</option></select>
            <button class="btn-red" onclick="window.saveToDB()" style="width:100px; padding:0;">บันทึก</button>
        </div>
        <div id="season-inputs-area"></div>
        <button onclick="window.addSeasonField()" style="background:rgba(255,255,255,0.05); border:1px dashed #444; color:#888; width:100%; padding:10px; border-radius:10px; cursor:pointer; margin-top:10px;">+ เพิ่มซีซันย่อย</button>
    </div>

    <div id="main-area">
        <div class="section-header"><div class="title-line"></div><h2 class="section-title">รายการแนะนำ</h2></div>
        <div class="content-grid" id="main-grid"></div>
    </div>
</div>

<div id="profile-modal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="window.closeModal('profile-modal')">&times;</span>
        <h2>โปรไฟล์</h2>
        <input type="text" id="p-nick" placeholder="ชื่อเล่น">
        <input type="text" id="p-ava" placeholder="URL รูปโปรไฟล์">
        <button class="btn-red" onclick="window.saveProfile()">บันทึก</button>
        <button class="btn-red" style="background:#222; margin-top:10px;" onclick="window.handleLogout()">ออกจากระบบ</button>
    </div>
</div>

<div id="detail-modal" class="modal">
    <div class="modal-content" style="max-width:900px; text-align:left;">
        <span class="close-btn" onclick="window.closeModal('detail-modal')">&times;</span>
        <h2 id="m-title" style="border-bottom: 2px solid var(--netflix-red); padding-bottom:10px;"></h2>
        <div id="m-list" class="content-grid" style="grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); margin-top:20px;"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, collection, addDoc, getDocs, query, where, orderBy, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyADNWKhUNqKyF19d-2WBHsHQ1uaZIAN8Bg", authDomain: "myanimeweb-1e859.firebaseapp.com",
        projectId: "myanimeweb-1e859", storageBucket: "myanimeweb-1e859.firebasestorage.app",
        messagingSenderId: "1018346930735", appId: "1:1018346930735:web:dd2d015e2a1f0c628b3cda"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const ADMIN = "tungpanithan1931@gmail.com";

    // ตัวแปร Global สำหรับเก็บข้อมูลที่โหลดมาแล้ว
    window.allAnimeData = [];
    window.userWatchHistory = [];
    let isRegMode = false;
    let editId = null;

    // --- ฟังก์ชันหลักสำหรับการวาด Grid (จุดที่ต้องเด้งเรียลไทม์) ---
    window.renderGrid = (list) => {
        const grid = document.getElementById('main-grid');
        if (!grid) return;
        grid.innerHTML = "";
        
        const isAdmin = auth.currentUser?.email === ADMIN;

        list.forEach(item => {
            // นับจำนวนซีซันที่ดูไปแล้วในเรื่องนี้
            const watchedCount = window.userWatchHistory.filter(x => x.key.startsWith(item.title + "|")).length;
            const totalSeasons = item.seasons?.length || 0;
            const isCompleted = totalSeasons > 0 && watchedCount >= totalSeasons;

            grid.innerHTML += `
                <div class="card">
                    ${isCompleted ? '<div class="check-badge">✓</div>' : ''}
                    ${isAdmin ? `<button onclick="window.editItem('${item.id}')" style="position:absolute; top:10px; right:10px; z-index:30; background:blue; color:white; border:none; border-radius:4px; padding:5px; font-size:10px;">แก้ไข</button>` : ''}
                    <img src="${item.image}" onclick="window.openDetail('${item.id}')">
                    <div class="card-info" onclick="window.openDetail('${item.id}')">
                        <span class="card-title">${item.title}</span>
                        <span class="card-season">${totalSeasons} ซีซัน</span>
                    </div>
                </div>`;
        });
    };

    // --- ฟังก์ชันคลิกเลือกซีซัน (เด้งเขียวหน้าหลัก) ---
    window.markRealtime = async (mTitle, sName, sImg, idx) => {
        const badge = document.getElementById(`badge-${idx}`);
        if(badge.style.display === 'flex') return;

        // 1. เด้งเขียวใน Modal ทันที
        badge.style.display = 'flex';

        // 2. อัปเดตตัวแปร Global ทันที
        window.userWatchHistory.push({ key: `${mTitle}|${sName}` });

        // 3. บังคับให้หน้าหลักวาดใหม่ (เพื่อให้ติ๊กถูกเด้งขึ้นมาทันที)
        window.renderGrid(window.allAnimeData);

        // 4. บันทึกลง Firebase
        try {
            await addDoc(collection(db, "user_watched"), {
                uid: auth.currentUser.uid,
                mainTitle: mTitle,
                seasonName: sName,
                image: sImg,
                timestamp: new Date()
            });
        } catch (e) { console.error("Firebase Error:", e); }
    };

    // --- AUTH & LOAD DATA ---
    onAuthStateChanged(auth, async user => {
        if(user) {
            document.getElementById('auth-ui').style.display = 'none';
            document.getElementById('main-ui').style.display = 'block';
            document.getElementById('nav-right').style.display = 'flex';
            if(user.email === ADMIN) document.getElementById('admin-panel').style.display = 'block';
            
            // โหลดประวัติการดูก่อน
            const sWatch = await getDocs(query(collection(db, "user_watched"), where("uid", "==", user.uid)));
            window.userWatchHistory = sWatch.docs.map(d => ({ key: `${d.data().mainTitle}|${d.data().seasonName}` }));

            // โหลดข้อมูลอนิเมะ
            const sAnime = await getDocs(query(collection(db, "all_anime"), orderBy("created", "desc")));
            window.allAnimeData = sAnime.docs.map(d => ({ id: d.id, ...d.data() }));
            
            window.renderGrid(window.allAnimeData);
            loadProfile(user.uid, user.email);
        } else {
            document.getElementById('auth-ui').style.display = 'flex';
        }
    });

    async function loadProfile(uid, email) {
        const d = await getDoc(doc(db, "users", uid));
        let n = email.split('@')[0], a = "https://upload.wikimedia.org/wikipedia/commons/0/0b/Netflix-avatar.png";
        if(d.exists()) { n = d.data().nickname || n; a = d.data().avatar || a; }
        document.getElementById('profile-area').innerHTML = `<div class="user-profile" onclick="window.openProfile('${n}','${a}')"><span>${n}</span><img src="${a}" class="user-avatar"></div>`;
    }

    // --- UTILS ---
    window.openDetail = (id) => {
        const item = window.allAnimeData.find(x => x.id === id);
        document.getElementById('m-title').innerText = item.title;
        const list = document.getElementById('m-list');
        list.innerHTML = "";
        item.seasons?.forEach((s, i) => {
            const isW = window.userWatchHistory.some(x => x.key === `${item.title}|${s.name}`);
            list.innerHTML += `<div class="card" onclick="window.markRealtime('${item.title}','${s.name}','${s.image}',${i})"><div id="badge-${i}" class="check-badge" style="display:${isW?'flex':'none'}">✓</div><img src="${s.image}"><div class="card-info"><span class="card-title" style="font-size:0.9rem;">${s.name}</span></div></div>`;
        });
        document.getElementById('detail-modal').style.display = 'flex';
    };

    window.toggleAuth = () => { isRegMode = !isRegMode; document.getElementById('auth-title').innerText = isRegMode ? "Sign Up" : "Sign In"; };
    window.runAuth = () => {
        const e = document.getElementById('email').value, p = document.getElementById('password').value;
        if(isRegMode) createUserWithEmailAndPassword(auth, e, p); else signInWithEmailAndPassword(auth, e, p);
    };
    window.handleLogout = () => signOut(auth).then(() => location.reload());
    window.closeModal = (id) => document.getElementById(id).style.display = 'none';
    window.openProfile = (n, a) => { document.getElementById('p-nick').value = n; document.getElementById('p-ava').value = a; document.getElementById('profile-modal').style.display = 'flex'; };
    window.saveProfile = async () => { await setDoc(doc(db, "users", auth.currentUser.uid), { nickname: document.getElementById('p-nick').value, avatar: document.getElementById('p-ava').value }); location.reload(); };

    // --- ADMIN TOOLS ---
    window.addSeasonField = (n="", i="") => {
        const d = document.createElement('div'); d.className = "admin-row";
        d.innerHTML = `<input type="text" class="sn" placeholder="ซีซัน" value="${n}"><input type="text" class="si" placeholder="URL ปก" value="${i}"><button onclick="this.parentElement.remove()" style="color:red; background:none; border:none; cursor:pointer;">X</button>`;
        document.getElementById('season-inputs-area').appendChild(d);
    };
    window.saveToDB = async () => {
        const sns = document.querySelectorAll('.sn'), sis = document.querySelectorAll('.si'); let arr = [];
        sns.forEach((x, i) => { if(x.value) arr.push({ name: x.value, image: sis[i].value }); });
        const p = { title: document.getElementById('adm-title').value, image: document.getElementById('adm-img').value, category: document.getElementById('adm-cat').value, seasons: arr, created: new Date() };
        if(editId) await updateDoc(doc(db, "all_anime", editId), p); else await addDoc(collection(db, "all_anime"), p); location.reload();
    };
    window.editItem = (id) => {
        editId = id; const it = window.allAnimeData.find(x => x.id === id);
        document.getElementById('adm-title').value = it.title; document.getElementById('adm-img').value = it.image;
        document.getElementById('season-inputs-area').innerHTML = ""; it.seasons?.forEach(s => window.addSeasonField(s.name, s.image));
    };
    window.handleSearch = () => {
        const q = document.getElementById('search-input').value.toLowerCase();
        window.renderGrid(window.allAnimeData.filter(x => x.title.toLowerCase().includes(q)));
    };
    window.filterCat = (c) => window.renderGrid(window.allAnimeData.filter(x => x.category === c));
    window.showHome = () => window.renderGrid(window.allAnimeData);
</script>
</body>
</html>
