<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY HUB | v52 Full Code Absolute</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* =========================================
           1. GLOBAL STYLE & VARIABLES
           ========================================= */
        :root {
            --netflix-red: #E50914;
            --netflix-black: #141414;
            --card-radius: 12px;
            --nav-height: 70px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background-color: var(--netflix-black);
            color: white;
            overflow-x: hidden;
        }

        /* =========================================
           2. NAVIGATION BAR
           ========================================= */
        nav {
            background: rgba(0, 0, 0, 0.95);
            padding: 0 4%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: var(--nav-height);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .nav-logo {
            color: var(--netflix-red);
            font-size: 2rem;
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 25px;
            cursor: pointer;
            color: #e5e5e5;
            font-size: 0.95rem;
        }

        .nav-menu li:hover {
            color: white;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        /* =========================================
           3. AUTHENTICATION (Login/Register)
           ========================================= */
        .auth-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://assets.nflxext.com/ffe/siteui/vlv3/f8ca36a4-ac20-4af2-9645-092df8591476/be0195e3-4610-4f81-9993-47000780f2d7/TH-en-20220523-popsignuptwoweeks-perspective_alpha_website_large.jpg');
            background-size: cover;
        }

        .auth-card {
            width: 450px;
            background: rgba(0, 0, 0, 0.85);
            padding: 60px;
            border-radius: 10px;
            text-align: left;
        }

        .auth-card h1 {
            font-size: 2rem;
            margin-bottom: 25px;
        }

        .auth-card input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            background: #333;
            border: none;
            border-radius: 5px;
            color: white;
            font-size: 1rem;
        }

        .btn-red {
            background: var(--netflix-red);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 5px;
            width: 100%;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
        }

        .auth-switch {
            margin-top: 30px;
            color: #8c8c8c;
            cursor: pointer;
        }

        /* =========================================
           4. CONTENT GRID & CARDS
           ========================================= */
        .container {
            padding: 100px 4% 50px;
        }

        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .card {
            position: relative;
            background: #181818;
            border-radius: var(--card-radius);
            overflow: hidden;
            aspect-ratio: 2/3;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.9) 70%);
            padding: 20px;
            text-align: center;
        }

        /* Green Checkmark Badge */
        .check-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background: #2ed573;
            color: white;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            border: 2px solid white;
            z-index: 10;
        }

        /* =========================================
           5. MODALS (Profile & Details)
           ========================================= */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            align-items: center;
            justify-content: center;
            z-index: 2000;
            backdrop-filter: blur(10px);
        }

        .modal-content {
            background: #181818;
            width: 90%;
            max-width: 450px;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid #333;
        }

        /* จัดตำแหน่งช่องกรอกโปรไฟล์ */
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #aaa;
            font-size: 0.9rem;
        }

        .modal-content input {
            width: 100%;
            padding: 12px;
            background: #222;
            border: 1px solid #444;
            border-radius: 8px;
            color: white;
            margin-bottom: 10px;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 1.5rem;
            cursor: pointer;
            color: #666;
        }

        /* =========================================
           6. USER PROFILE DISPLAY
           ========================================= */
        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .user-avatar {
            width: 38px;
            height: 38px;
            border-radius: 4px;
            object-fit: cover;
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-left">
        <div class="nav-logo" onclick="location.reload()">MY HUB</div>
        <ul class="nav-menu">
            <li onclick="window.goHome()">หน้าหลัก</li>
            <li onclick="window.showHistory()">ประวัติการดู</li>
        </ul>
    </div>
    <div class="nav-right" id="nav-right-area" style="display:none;">
        <div id="user-display-slot"></div>
    </div>
</nav>

<div id="auth-section" class="auth-wrapper">
    <div class="auth-card">
        <h1 id="auth-headline">Sign In</h1>
        <input type="email" id="user-email" placeholder="อีเมล">
        <input type="password" id="user-pass" placeholder="รหัสผ่าน">
        <button class="btn-red" onclick="window.executeAuth()">เข้าสู่ระบบ</button>
        <p class="auth-switch" onclick="window.toggleAuthMode()">ยังไม่มีบัญชีใช่ไหม? <b>สมัครสมาชิกที่นี่</b></p>
    </div>
</div>

<div id="main-section" class="container" style="display:none;">
    <div id="admin-tools" style="display:none; margin-bottom:20px;">
        <button class="btn-red" style="width:auto; padding:10px 20px;" onclick="window.openAdminAdd()">+ เพิ่มข้อมูลใหม่</button>
    </div>
    <div class="content-grid" id="main-grid-output"></div>
</div>

<div id="profile-modal" class="modal">
    <div class="modal-content">
        <h2>แก้ไขโปรไฟล์</h2>
        <p style="color:#888; margin-bottom:20px;">จัดการข้อมูลส่วนตัวของคุณ</p>
        
        <div class="input-group">
            <label>ชื่อเล่นของคุณ</label>
            <input type="text" id="edit-nick-input" placeholder="ตัวอย่าง: Admin_M">
        </div>

        <div class="input-group">
            <label>URL รูปโปรไฟล์ (Link)</label>
            <input type="text" id="edit-avatar-input" placeholder="ใส่ลิงก์รูปภาพ https://...">
        </div>

        <button class="btn-red" onclick="window.updateUserProfile()">บันทึกข้อมูล</button>
        <button class="btn-red" style="background:#333; margin-top:10px;" onclick="window.appLogout()">ออกจากระบบ</button>
        <p onclick="window.closeModal('profile-modal')" style="margin-top:20px; cursor:pointer; color:#666;">ปิดหน้าต่าง</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyADNWKhUNqKyF19d-2WBHsHQ1uaZIAN8Bg",
        authDomain: "myanimeweb-1e859.firebaseapp.com",
        projectId: "myanimeweb-1e859",
        storageBucket: "myanimeweb-1e859.firebasestorage.app",
        messagingSenderId: "1018346930735",
        appId: "1:1018346930735:web:dd2d015e2a1f0c628b3cda"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // APP DATA STORAGE
    window.fullDataList = [];
    let isSignUpMode = false;

    // --- 1. AUTHENTICATION WATCHER ---
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            // Logged In
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('main-section').style.display = 'block';
            document.getElementById('nav-right-area').style.display = 'flex';
            
            await fetchProfile(user);
            await loadMainContent();
        } else {
            // Logged Out
            document.getElementById('auth-section').style.display = 'flex';
            document.getElementById('main-section').style.display = 'none';
            document.getElementById('nav-right-area').style.display = 'none';
        }
    });

    // --- 2. DATA LOADING ---
    async function loadMainContent() {
        const snap = await getDocs(query(collection(db, "all_anime"), orderBy("created", "desc")));
        window.fullDataList = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderAll(window.fullDataList);
    }

    function renderAll(list) {
        const grid = document.getElementById('main-grid-output');
        grid.innerHTML = "";
        list.forEach(item => {
            grid.innerHTML += `
                <div class="card" onclick="window.openDetails('${item.id}')">
                    <img src="${item.image}">
                    <div class="card-info">
                        <span class="card-title">${item.title}</span>
                    </div>
                </div>`;
        });
    }

    async function fetchProfile(user) {
        const docRef = doc(db, "users", user.uid);
        const docSnap = await getDoc(docRef);
        
        let d_name = user.email.split('@')[0];
        let d_img = "https://upload.wikimedia.org/wikipedia/commons/0/0b/Netflix-avatar.png";

        if (docSnap.exists()) {
            d_name = docSnap.data().nickname || d_name;
            d_img = docSnap.data().avatar || d_img;
        }

        document.getElementById('user-display-slot').innerHTML = `
            <div class="user-profile" onclick="window.openProfileUI('${d_name}', '${d_img}')">
                <span>${d_name}</span>
                <img src="${d_img}" class="user-avatar">
            </div>`;
    }

    // --- 3. WINDOW GLOBAL FUNCTIONS ---
    
    window.toggleAuthMode = () => {
        isSignUpMode = !isSignUpMode;
        document.getElementById('auth-headline').innerText = isSignUpMode ? "Sign Up" : "Sign In";
        document.getElementById('auth-switch').innerHTML = isSignUpMode ? "มีบัญชีแล้วใช่ไหม? <b>เข้าสู่ระบบ</b>" : "ยังไม่มีบัญชีใช่ไหม? <b>สมัครสมาชิกที่นี่</b>";
    };

    window.executeAuth = () => {
        const e = document.getElementById('user-email').value;
        const p = document.getElementById('user-pass').value;
        if(isSignUpMode) {
            createUserWithEmailAndPassword(auth, e, p).catch(err => alert(err.message));
        } else {
            signInWithEmailAndPassword(auth, e, p).catch(err => alert("อีเมลหรือรหัสผ่านผิด"));
        }
    };

    // แก้ไขจุดที่เป็นปัญหา Error signOut()
    window.appLogout = () => {
        signOut(auth).then(() => {
            location.reload();
        }).catch(err => console.error(err));
    };

    window.openProfileUI = (n, a) => {
        document.getElementById('edit-nick-input').value = n;
        document.getElementById('edit-avatar-input').value = a;
        document.getElementById('profile-modal').style.display = 'flex';
    };

    window.closeModal = (id) => {
        document.getElementById(id).style.display = 'none';
    };

    window.updateUserProfile = async () => {
        const user = auth.currentUser;
        if(!user) return;

        const updatedNick = document.getElementById('edit-nick-input').value;
        const updatedAva = document.getElementById('edit-avatar-input').value;

        await setDoc(doc(db, "users", user.uid), {
            nickname: updatedNick,
            avatar: updatedAva
        }, { merge: true });

        alert("อัปเดตข้อมูลสำเร็จ!");
        location.reload();
    };

    window.goHome = () => renderAll(window.fullDataList);
</script>
</body>
</html>
