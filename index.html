<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY HUB | Sorted Entertainment</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --netflix-red: #E50914;
            --netflix-black: #141414;
            --text-color: #FFFFFF;
            --nav-height: 70px; 
        }

        * { box-sizing: border-box; }
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--netflix-black);
            color: var(--text-color);
            margin: 0; padding: 0;
            scroll-behavior: smooth;
        }

        /* --- PREMIUM NAVBAR --- */
        nav {
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 100%);
            padding: 0 4%;
            display: flex;
            align-items: center;
            height: var(--nav-height);
            position: fixed;
            top: 0; width: 100%;
            z-index: 1000;
            transition: background-color 0.4s ease;
        }
        nav.scrolled { background-color: var(--netflix-black); }

        .nav-left { display: flex; align-items: center; gap: 40px; flex-grow: 1; }
        .nav-logo { color: var(--netflix-red); font-size: 1.8rem; font-weight: 700; text-decoration: none; }

        .nav-menu { display: flex; list-style: none; gap: 20px; margin: 0; padding: 0; }
        .nav-menu li a { 
            color: #E5E5E5; 
            text-decoration: none; 
            font-size: 0.85rem;
            cursor: pointer;
            transition: color 0.3s;
        }
        .nav-menu li a:hover, .nav-menu li a.active { color: #FFF; font-weight: 600; }

        .nav-right { display: flex; align-items: center; gap: 20px; }
        .user-profile { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .user-avatar { width: 32px; height: 32px; border-radius: 4px; object-fit: cover; }
        
        /* --- CONTENT --- */
        .container { padding: 80px 4% 20px; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .section-title { font-size: 1.5rem; font-weight: 500; margin: 0; }

        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 50px;
        }
        .card { 
            background: #181818; border-radius: 4px; overflow: hidden; 
            position: relative; transition: transform 0.3s ease;
        }
        .card:hover { transform: scale(1.05); z-index: 2; }
        .card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        .card-info { padding: 12px; background: #181818; }
        .category-tag { 
            font-size: 0.6rem; background: #333; color: #aaa; 
            padding: 2px 6px; border-radius: 2px; text-transform: uppercase; 
            margin-bottom: 5px; display: inline-block;
        }

        /* --- BUTTONS --- */
        .btn-red { background: var(--netflix-red); color: white; border: none; padding: 8px; border-radius: 4px; cursor: pointer; width: 100%; font-family: 'Kanit'; }
        .btn-done { background: #2ed573; color: white; border: none; padding: 8px; border-radius: 4px; width: 100%; cursor: default; }

        #auth-section { max-width: 400px; margin: 20vh auto; text-align: center; background: rgba(0,0,0,0.7); padding: 40px; border-radius: 8px; }
        input { padding: 15px; margin-bottom: 15px; width: 100%; background: #333; border: none; color: white; border-radius: 4px; }

        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; }
        .modal-content { background: #181818; padding: 30px; border-radius: 8px; width: 350px; text-align: center; }
    </style>
</head>
<body>

<nav id="navbar">
    <div class="nav-left">
        <a href="#" class="nav-logo" onclick="filterCategory('All')">MY HUB</a>
        <ul class="nav-menu">
            <li><a onclick="filterCategory('All')">Home</a></li>
            <li><a onclick="filterCategory('Series')">TV Shows</a></li>
            <li><a onclick="filterCategory('Movie')">Movies</a></li>
            <li><a onclick="filterCategory('Anime')">Anime</a></li>
            <li><a onclick="filterCategory('Manga')">Manga</a></li>
            <li><a href="#my-list">My List</a></li>
        </ul>
    </div>
    <div class="nav-right" id="user-nav"></div>
</nav>

<div class="container">
    <div id="auth-section">
        <h1>Sign In</h1>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button class="btn-red" onclick="handleLogin()">Sign In</button>
        <p style="font-size: 0.8rem; margin-top: 15px;">New? <a href="#" onclick="handleSignUp()" style="color:white">Create Account</a></p>
    </div>

    <div id="main-content" style="display: none;">
        <div class="section-header">
            <h3 class="section-title" id="display-category">Recommended for You</h3>
        </div>
        <div class="content-grid" id="admin-list"></div>

        <div id="my-list">
            <h3 class="section-title" style="margin-bottom: 20px;">My Completed List</h3>
            <div class="content-grid" id="my-watched-list"></div>
        </div>
    </div>
</div>

<div id="profile-modal" class="modal">
    <div class="modal-content">
        <h3>Edit Profile</h3>
        <img id="avatar-preview" src="" style="width:80px; height:80px; border-radius:4px; margin-bottom:15px; object-fit:cover;">
        <input type="file" id="file-input" style="margin-bottom:15px; font-size: 10px;">
        <input type="text" id="nickname-input" placeholder="Nickname">
        <button class="btn-red" onclick="saveProfile()">Save</button>
        <button onclick="closeModal()" style="background:none; border:none; color:grey; margin-top:10px; cursor:pointer;">Cancel</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyADNWKhUNqKyF19d-2WBHsHQ1uaZIAN8Bg",
        authDomain: "myanimeweb-1e859.firebaseapp.com",
        projectId: "myanimeweb-1e859",
        storageBucket: "myanimeweb-1e859.firebasestorage.app",
        messagingSenderId: "1018346930735",
        appId: "1:1018346930735:web:dd2d015e2a1f0c628b3cda"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);

    let allData = []; // เก็บข้อมูลทั้งหมดจาก Admin
    let userWatched = [];
    let currentCategory = 'All';

    // --- Filtering Logic ---
    window.filterCategory = (cat) => {
        currentCategory = cat;
        document.getElementById('display-category').innerText = cat === 'All' ? 'Recommended for You' : cat;
        renderAdminList();
    };

    async function fetchAdminData() {
        const snap = await getDocs(collection(db, "all_anime"));
        allData = [];
        snap.forEach(doc => allData.push(doc.data()));
        renderAdminList();
    }

    function renderAdminList() {
        const list = document.getElementById('admin-list');
        list.innerHTML = "";
        
        // กรองข้อมูลตามหมวดหมู่
        const filtered = currentCategory === 'All' 
            ? allData 
            : allData.filter(item => item.category === currentCategory);

        filtered.forEach(d => {
            const isWatched = userWatched.includes(d.title);
            list.innerHTML += `
                <div class="card">
                    <img src="${d.image}">
                    <div class="card-info">
                        <span class="category-tag">${d.category || 'Movie'}</span>
                        <div style="font-size:0.9rem; margin-bottom:10px; font-weight:500;">${d.title}</div>
                        ${isWatched ? `<button class="btn-done">Completed</button>` : 
                        `<button class="btn-red" onclick="markWatched('${d.title}','${d.image}')">Mark as Done</button>`}
                    </div>
                </div>`;
        });
    }

    // --- Auth & Profile Functions ---
    window.handleLogin = async () => {
        try { await signInWithEmailAndPassword(auth, email.value, password.value); } catch(e) { alert("Login failed"); }
    };

    window.handleSignUp = async () => {
        try { await createUserWithEmailAndPassword(auth, email.value, password.value); alert("Signed up!"); } catch(e) { alert(e.message); }
    };

    window.logout = () => { signOut(auth).then(() => location.reload()); };

    window.openModal = () => { document.getElementById('profile-modal').style.display='flex'; };
    window.closeModal = () => { document.getElementById('profile-modal').style.display='none'; };

    window.saveProfile = async () => {
        const user = auth.currentUser;
        const file = document.getElementById('file-input').files[0];
        let url = "";
        if(file) {
            const sRef = ref(storage, `users/${user.uid}`);
            await uploadBytes(sRef, file);
            url = await getDownloadURL(sRef);
        }
        await setDoc(doc(db, "users", user.uid), { nickname: nickname-input.value, avatar: url }, {merge: true});
        location.reload();
    };

    window.markWatched = async (t, i) => {
        await addDoc(collection(db, "user_watched"), { uid: auth.currentUser.uid, animeName: t, image: i });
        loadUserList(auth.currentUser.uid);
    };

    async function loadUserList(uid) {
        const q = query(collection(db, "user_watched"), where("uid", "==", uid));
        const snap = await getDocs(q);
        userWatched = [];
        const myList = document.getElementById('my-watched-list');
        myList.innerHTML = "";

        snap.forEach(doc => {
            const d = doc.data();
            if(!userWatched.includes(d.animeName)) {
                userWatched.push(d.animeName);
                myList.innerHTML += `<div class="card"><img src="${d.image}"><div class="card-info">${d.animeName} ✅</div></div>`;
            }
        });
        renderAdminList();
    }

    onAuthStateChanged(auth, async user => {
        if(user) {
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            
            const uDoc = await getDoc(doc(db, "users", user.uid));
            const uData = uDoc.exists() ? uDoc.data() : { avatar: "https://upload.wikimedia.org/wikipedia/commons/0/0b/Netflix-avatar.png", nickname: "User" };
            
            document.getElementById('user-nav').innerHTML = `
                <div class="user-profile" onclick="openModal()">
                    <span style="font-size:0.8rem">${uData.nickname || user.email}</span>
                    <img src="${uData.avatar}" class="user-avatar">
                </div>
                <button onclick="logout()" style="background:none; border:none; color:red; cursor:pointer; font-size:10px">Sign Out</button>
            `;
            
            fetchAdminData();
            loadUserList(user.uid);
        } else {
            document.getElementById('auth-section').style.display = 'block';
            document.getElementById('main-content').style.display = 'none';
        }
    });

</script>
</body>
</html>
