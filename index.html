<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY HUB | Complete Large Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --netflix-red: #E50914;
            --netflix-black: #141414;
            --nav-height: 70px;
        }

        * { box-sizing: border-box; }
        body {
            font-family: 'Kanit', sans-serif;
            background-color: var(--netflix-black);
            color: white;
            margin: 0; padding: 0;
            overflow-x: hidden;
        }

        /* --- NAVBAR --- */
        nav {
            background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, transparent 100%);
            padding: 0 4%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: var(--nav-height);
            position: fixed; top: 0; width: 100%;
            z-index: 1000; transition: 0.3s;
        }
        nav.scrolled { background-color: var(--netflix-black); }

        .nav-left { display: flex; align-items: center; gap: 30px; }
        .nav-logo { color: var(--netflix-red); font-size: 1.8rem; font-weight: 700; text-decoration: none; }
        .nav-menu { display: flex; list-style: none; gap: 20px; padding: 0; margin: 0; cursor: pointer; }
        .nav-menu li { color: #e5e5e5; font-size: 1rem; }

        .nav-right-group { display: flex; align-items: center; gap: 20px; }
        .search-box { position: relative; width: 280px; }
        .search-box input {
            background: rgba(255,255,255,0.1); border: 1px solid #444; border-radius: 20px;
            padding: 8px 15px 8px 40px; width: 100%; color: white; outline: none;
        }
        .search-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #888; }
        .user-box { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .user-img { width: 34px; height: 34px; border-radius: 4px; object-fit: cover; }

        /* --- CONTENT GRID: ปรับขนาดใหญ่ 220px --- */
        .container { padding: 100px 4% 40px; }
        .section-title { font-size: 1.6rem; margin-bottom: 25px; font-weight: 500; border-left: 4px solid var(--netflix-red); padding-left: 15px; }
        
        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px; margin-bottom: 50px;
        }

        .card {
            position: relative;
            background: #222;
            border-radius: 8px;
            overflow: hidden;
            aspect-ratio: 2 / 3;
            transition: 0.3s;
            cursor: pointer;
        }
        .card:hover { transform: scale(1.05); z-index: 5; }
        .card img { width: 100%; height: 100%; object-fit: cover; }

        .card-overlay {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%);
            padding: 30px 10px 10px; text-align: center;
        }
        .card-title { font-size: 1rem; color: #fff; line-height: 1.2; }

        /* --- ADMIN PANEL --- */
        #admin-panel {
            display: none; background: #111; padding: 25px; border-radius: 10px;
            margin: 100px 4% 0; border: 1px solid #333;
        }
        .admin-row { display: grid; grid-template-columns: 2fr 2fr 1fr auto; gap: 10px; margin-bottom: 15px; }

        /* --- AUTH --- */
        .auth-card { max-width: 400px; margin: 15vh auto; background: rgba(0,0,0,0.85); padding: 50px; border-radius: 8px; text-align: center; }
        .btn-red { background: var(--netflix-red); color: white; border: none; padding: 12px; border-radius: 4px; cursor: pointer; font-weight: 600; width: 100%; }
        input, select { padding: 10px; background: #333; border: 1px solid #444; color: white; border-radius: 4px; width: 100%; }
        
        /* MODAL */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; z-index: 2000; }
        .modal-content { background: #181818; width: 90%; max-width: 600px; padding: 30px; border-radius: 12px; position: relative; }
    </style>
</head>
<body>

<nav id="navbar">
    <div class="nav-left">
        <a href="#" class="nav-logo" onclick="location.reload()">MY HUB</a>
        <ul class="nav-menu">
            <li onclick="filterCategory('All')">หน้าหลัก</li>
            <li onclick="filterCategory('Movie')">ภาพยนตร์</li>
            <li onclick="filterCategory('Series')">ซีรีส์</li>
            <li onclick="filterCategory('Anime')">อนิเมะ</li>
        </ul>
    </div>
    <div class="nav-right-group" id="nav-right" style="display:none;">
        <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="text" id="search-input" placeholder="ค้นหาชื่อเรื่อง..." onkeyup="handleSearch()">
        </div>
        <div id="user-display"></div>
    </div>
</nav>

<div id="admin-panel">
    <div class="admin-row">
        <input type="text" id="adm-title" placeholder="ชื่อเรื่องหลัก">
        <input type="text" id="adm-img" placeholder="URL ปกหลัก">
        <select id="adm-cat">
            <option value="Anime">Anime</option>
            <option value="Movie">Movie</option>
            <option value="Series">Series</option>
        </select>
        <button class="btn-red" onclick="addToDatabase()" style="width:80px;">บันทึก</button>
    </div>
    <div id="season-inputs"></div>
    <button onclick="addSeasonField()" style="background:#222; color:#ccc; border:1px solid #444; padding:5px; border-radius:4px; cursor:pointer;">+ เพิ่มซีซัน</button>
</div>

<div id="auth-ui" class="auth-card">
    <h1 id="auth-title" style="margin-bottom:30px;">Sign In</h1>
    <input type="email" id="email" placeholder="อีเมล" style="margin-bottom:10px;">
    <input type="password" id="password" placeholder="รหัสผ่าน" style="margin-bottom:20px;">
    <button class="btn-red" onclick="runAuth()" id="auth-btn">เข้าสู่ระบบ</button>
    <p style="margin-top:20px; font-size:0.9rem; color:#aaa;" onclick="toggleAuth()" id="auth-switch">ยังไม่มีบัญชี? <b style="color:white; cursor:pointer;">สมัครสมาชิกที่นี่</b></p>
</div>

<div id="main-ui" class="container" style="display:none;">
    <h2 class="section-title" id="cat-label">รายการแนะนำสำหรับคุณ</h2>
    <div class="content-grid" id="main-grid"></div>
</div>

<div id="detail-modal" class="modal">
    <div class="modal-content">
        <h3 id="modal-title"></h3>
        <div id="season-list" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(140px, 1fr)); gap:10px; margin-top:20px;"></div>
        <button class="btn-red" onclick="document.getElementById('detail-modal').style.display='none'" style="margin-top:20px;">ปิด</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, collection, addDoc, getDocs, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyADNWKhUNqKyF19d-2WBHsHQ1uaZIAN8Bg",
        authDomain: "myanimeweb-1e859.firebaseapp.com",
        projectId: "myanimeweb-1e859",
        storageBucket: "myanimeweb-1e859.firebasestorage.app",
        messagingSenderId: "1018346930735",
        appId: "1:1018346930735:web:dd2d015e2a1f0c628b3cda"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const ADMIN_MAIL = "tungpanithan1931@gmail.com";

    let isRegister = false;
    let allData = [];

    // ฟังก์ชันสลับ Sign In / Sign Up
    window.toggleAuth = () => {
        isRegister = !isRegister;
        document.getElementById('auth-title').innerText = isRegister ? "Sign Up" : "Sign In";
        document.getElementById('auth-btn').innerText = isRegister ? "สมัครสมาชิก" : "เข้าสู่ระบบ";
        document.getElementById('auth-switch').innerHTML = isRegister ? "มีบัญชีแล้ว? <b style='color:white;'>เข้าสู่ระบบ</b>" : "ยังไม่มีบัญชี? <b style='color:white;'>สมัครสมาชิกที่นี่</b>";
    };

    window.runAuth = () => {
        const m = document.getElementById('email').value;
        const p = document.getElementById('password').value;
        if(isRegister) createUserWithEmailAndPassword(auth, m, p).catch(e => alert(e.message));
        else signInWithEmailAndPassword(auth, m, p).catch(e => alert(e.message));
    };

    onAuthStateChanged(auth, async user => {
        if(user) {
            document.getElementById('auth-ui').style.display = 'none';
            document.getElementById('main-ui').style.display = 'block';
            document.getElementById('nav-right').style.display = 'flex';
            if(user.email === ADMIN_MAIL) document.getElementById('admin-panel').style.display = 'block';
            
            const uDoc = await getDoc(doc(db, "users", user.uid));
            let nick = user.email.split('@')[0];
            let img = "https://upload.wikimedia.org/wikipedia/commons/0/0b/Netflix-avatar.png";
            if(uDoc.exists()) { nick = uDoc.data().nickname || nick; img = uDoc.data().avatar || img; }
            document.getElementById('user-display').innerHTML = `<div class="user-box"><span>${nick}</span><img src="${img}" class="user-img"></div>`;
            
            loadData();
        } else {
            document.getElementById('auth-ui').style.display = 'block';
            document.getElementById('main-ui').style.display = 'none';
            document.getElementById('nav-right').style.display = 'none';
        }
    });

    async function loadData() {
        const snap = await getDocs(query(collection(db, "all_anime"), orderBy("created", "desc")));
        allData = []; snap.forEach(d => allData.push({ id: d.id, ...d.data() }));
        render(allData);
    }

    function render(list) {
        const grid = document.getElementById('main-grid'); grid.innerHTML = "";
        list.forEach(item => {
            grid.innerHTML += `
                <div class="card" onclick="openDetails('${item.id}')">
                    <img src="${item.image}">
                    <div class="card-overlay"><div class="card-title">${item.title}</div></div>
                </div>`;
        });
    }

    // ระบบหลายซีซัน
    window.openDetails = (id) => {
        const item = allData.find(x => x.id === id);
        document.getElementById('modal-title').innerText = item.title;
        const list = document.getElementById('season-list'); list.innerHTML = "";
        if(item.seasons) {
            item.seasons.forEach(s => {
                list.innerHTML += `<div style="background:#222; border-radius:6px; overflow:hidden;"><img src="${s.image}" style="width:100%; aspect-ratio:2/3; object-fit:cover;"><div style="padding:5px; text-align:center; font-size:0.8rem;">${s.name}</div></div>`;
            });
        }
        document.getElementById('detail-modal').style.display = 'flex';
    };

    // ส่วนของ Admin: เพิ่มซีซัน
    window.addSeasonField = () => {
        const container = document.getElementById('season-inputs');
        const div = document.createElement('div');
        div.className = "admin-row";
        div.innerHTML = `<input type="text" class="sn" placeholder="ชื่อซีซัน (SS1)"><input type="text" class="si" placeholder="URL ปกซีซัน"><button onclick="this.parentElement.remove()" style="background:red; color:white; border:none; border-radius:4px;">X</button>`;
        container.appendChild(div);
    };

    window.addToDatabase = async () => {
        const title = document.getElementById('adm-title').value;
        const image = document.getElementById('adm-img').value;
        const category = document.getElementById('adm-cat').value;
        const sns = document.querySelectorAll('.sn');
        const sis = document.querySelectorAll('.si');
        let seasons = [];
        sns.forEach((s, i) => { if(s.value) seasons.push({ name: s.value, image: sis[i].value || image }); });

        await addDoc(collection(db, "all_anime"), { title, image, category, seasons, created: new Date() });
        location.reload();
    };

    window.handleSearch = () => {
        const q = document.getElementById('search-input').value.toLowerCase();
        render(allData.filter(x => x.title.toLowerCase().includes(q)));
    };

    window.filterCategory = (c) => {
        document.getElementById('cat-label').innerText = c === 'All' ? 'รายการแนะนำ' : c;
        render(c === 'All' ? allData : allData.filter(x => x.category === c));
    };

    window.onscroll = () => {
        const nav = document.getElementById('navbar');
        window.pageYOffset > 50 ? nav.classList.add('scrolled') : nav.classList.remove('scrolled');
    };
</script>
</body>
</html>
