<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY HUB | Ultimate Entertainment</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --netflix-red: #E50914;
            --netflix-black: #141414;
            --card-bg: #181818;
            --nav-height: 70px;
        }

        * { box-sizing: border-box; }
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--netflix-black);
            color: white;
            margin: 0; padding: 0;
            scroll-behavior: smooth;
        }

        /* --- PREMIUM NAVBAR --- */
        nav {
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 100%);
            padding: 0 4%;
            display: flex; align-items: center;
            height: var(--nav-height);
            position: fixed; top: 0; width: 100%;
            z-index: 1000; transition: 0.4s;
        }
        nav.scrolled { background-color: var(--netflix-black); }

        .nav-left { display: flex; align-items: center; gap: 40px; flex-grow: 1; }
        .nav-logo { color: var(--netflix-red); font-size: 1.8rem; font-weight: 700; text-decoration: none; letter-spacing: -1px; }

        .nav-menu { display: flex; list-style: none; gap: 20px; margin: 0; padding: 0; }
        .nav-menu li a { 
            color: #E5E5E5; text-decoration: none; font-size: 0.85rem;
            cursor: pointer; transition: 0.3s;
        }
        .nav-menu li a:hover, .nav-menu li a.active { color: #FFF; font-weight: bold; }

        .nav-right { display: flex; align-items: center; gap: 20px; }
        .user-profile { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .user-avatar { width: 32px; height: 32px; border-radius: 4px; object-fit: cover; border: 1px solid #333; }

        /* --- ADMIN PANEL --- */
        #admin-panel {
            display: none; background: #1a1a1a; padding: 30px; border-radius: 8px;
            margin: 100px 4% 20px; border: 1px dashed var(--netflix-red);
        }
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 15px; align-items: end; }
        .admin-grid label { display: block; font-size: 0.75rem; color: #888; margin-bottom: 5px; }

        /* --- CONTENT SECTION --- */
        .container { padding: 40px 4%; margin-top: 60px; }
        .section-title { font-size: 1.6rem; margin-bottom: 20px; font-weight: 500; }
        
        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 15px; margin-bottom: 50px;
        }

        .card {
            background: var(--card-bg); border-radius: 4px; overflow: hidden;
            position: relative; transition: 0.3s;
        }
        .card:hover { transform: scale(1.05); z-index: 5; }
        .card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        .card-info { padding: 12px; }
        .tag { font-size: 0.6rem; color: #aaa; background: #333; padding: 2px 6px; border-radius: 2px; text-transform: uppercase; margin-bottom: 5px; display: inline-block; }

        /* --- UI COMPONENTS --- */
        input, select { padding: 12px; background: #333; border: none; color: white; border-radius: 4px; width: 100%; font-family: 'Kanit'; font-size: 0.9rem; }
        .btn-red { background: var(--netflix-red); color: white; border: none; padding: 12px; border-radius: 4px; cursor: pointer; font-weight: 600; width: 100%; transition: 0.2s; }
        .btn-red:hover { background: #ff0a16; }
        .btn-done { background: #2ed573; color: white; border: none; padding: 10px; border-radius: 4px; width: 100%; cursor: default; font-weight: 600; }

        #auth-section { max-width: 400px; margin: 20vh auto; background: rgba(0,0,0,0.75); padding: 50px; border-radius: 8px; text-align: center; }
        
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; }
        .modal-content { background: #181818; padding: 40px; border-radius: 12px; width: 400px; text-align: center; box-shadow: 0 0 20px rgba(0,0,0,0.5); }

        @media (max-width: 900px) {
            .admin-grid { grid-template-columns: 1fr; }
            .nav-menu { display: none; }
        }
    </style>
</head>
<body>

<nav id="navbar">
    <div class="nav-left">
        <a href="#" class="nav-logo" onclick="filterCategory('All')">MY HUB</a>
        <ul class="nav-menu">
            <li><a onclick="filterCategory('All')">Home</a></li>
            <li><a onclick="filterCategory('Series')">TV Shows</a></li>
            <li><a onclick="filterCategory('Movie')">Movies</a></li>
            <li><a onclick="filterCategory('Anime')">Anime</a></li>
            <li><a onclick="filterCategory('Manga')">Manga</a></li>
            <li><a href="#my-list">My List</a></li>
        </ul>
    </div>
    <div class="nav-right" id="user-nav"></div>
</nav>

<div id="admin-panel">
    <h3 style="margin-top:0; color:var(--netflix-red); letter-spacing: 1px;">ADMIN CONTROL PANEL</h3>
    <div class="admin-grid">
        <div>
            <label>Content Title</label>
            <input type="text" id="adm-title" placeholder="E.g. Stranger Things">
        </div>
        <div>
            <label>Poster Image URL</label>
            <input type="text" id="adm-img" placeholder="https://link-to-image.jpg">
        </div>
        <div>
            <label>Category</label>
            <select id="adm-cat">
                <option value="Movie">Movie</option>
                <option value="Series">Series</option>
                <option value="Anime">Anime</option>
                <option value="Manga">Manga</option>
            </select>
        </div>
        <button class="btn-red" onclick="addToDatabase()" style="width:140px; height: 45px;">ADD CONTENT</button>
    </div>
</div>

<div class="container">
    <div id="auth-section">
        <h1 style="text-align:left; margin-bottom: 30px;">Sign In</h1>
        <input type="email" id="email" placeholder="Email" style="margin-bottom: 15px;">
        <input type="password" id="password" placeholder="Password" style="margin-bottom: 25px;">
        <button class="btn-red" onclick="handleLogin()">Sign In</button>
        <p style="color:#777; margin-top:30px; font-size: 0.9rem;">New to My Hub? <a href="#" onclick="handleSignUp()" style="color:white; text-decoration:none; font-weight:bold;">Sign up now.</a></p>
    </div>

    <div id="main-content" style="display: none;">
        <h3 class="section-title" id="cat-title">Recommended for You</h3>
        <div class="content-grid" id="content-display"></div>

        <div id="my-list">
            <h3 class="section-title" style="border-top: 1px solid #333; padding-top: 40px;">My Completed List</h3>
            <div class="content-grid" id="watched-display"></div>
        </div>
    </div>
</div>

<div id="profile-modal" class="modal">
    <div class="modal-content">
        <h2 style="margin-top:0">Edit Profile</h2>
        <img id="preview-avatar" src="" style="width:100px; height:100px; border-radius:4px; margin-bottom:20px; object-fit:cover; border: 2px solid var(--netflix-red);">
        <label style="display:block; text-align:left; font-size:0.7rem; color:#888; margin-bottom:5px;">Change Avatar Image</label>
        <input type="file" id="upload-file" style="margin-bottom:20px; font-size:12px; padding: 5px; background: transparent;">
        <label style="display:block; text-align:left; font-size:0.7rem; color:#888; margin-bottom:5px;">Nickname</label>
        <input type="text" id="nick-input" placeholder="Enter your nickname" style="margin-bottom: 25px;">
        <button class="btn-red" onclick="saveProfile()">SAVE CHANGES</button>
        <button onclick="closeModal()" style="background:none; border:none; color:#777; margin-top:20px; cursor:pointer; font-size: 0.9rem;">Cancel</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyADNWKhUNqKyF19d-2WBHsHQ1uaZIAN8Bg",
        authDomain: "myanimeweb-1e859.firebaseapp.com",
        projectId: "myanimeweb-1e859",
        storageBucket: "myanimeweb-1e859.firebasestorage.app",
        messagingSenderId: "1018346930735",
        appId: "1:1018346930735:web:dd2d015e2a1f0c628b3cda"
    };

    // --- CONFIGURATION ---
    const ADMIN_EMAIL = "tungpanithan1931@gmail.com"; 
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);

    let masterData = [];
    let watchedList = [];
    let currentCat = 'All';

    // --- ADMIN ACTIONS ---
    window.addToDatabase = async () => {
        const t = document.getElementById('adm-title').value;
        const i = document.getElementById('adm-img').value;
        const c = document.getElementById('adm-cat').value;
        
        if(!t || !i) return alert("Please fill in both Title and Image URL!");
        
        try {
            await addDoc(collection(db, "all_anime"), { 
                title: t, 
                image: i, 
                category: c, 
                created: new Date() 
            });
            alert("New content added successfully!");
            location.reload(); 
        } catch (e) { alert("Error: " + e.message); }
    };

    // --- FILTERING LOGIC ---
    window.filterCategory = (cat) => {
        currentCat = cat;
        document.getElementById('cat-title').innerText = cat === 'All' ? 'Recommended for You' : cat;
        
        // UI: Highlight active menu
        const menus = document.querySelectorAll('.nav-menu a');
        menus.forEach(m => m.classList.remove('active'));
        // (Optional: add logic to highlight the clicked category)
        
        renderHome();
    };

    function renderHome() {
        const display = document.getElementById('content-display');
        display.innerHTML = "";
        
        const filtered = currentCat === 'All' ? masterData : masterData.filter(x => x.category === currentCat);
        
        if(filtered.length === 0) {
            display.innerHTML = "<p style='color:#555'>No content found in this category.</p>";
            return;
        }

        filtered.forEach(item => {
            const isDone = watchedList.includes(item.title);
            display.innerHTML += `
                <div class="card">
                    <img src="${item.image}" alt="${item.title}" onerror="this.src='https://via.placeholder.com/300x169?text=No+Image'">
                    <div class="card-info">
                        <span class="tag">${item.category || 'Movie'}</span>
                        <div style="margin: 5px 0 15px 0; font-weight:500; font-size: 0.95rem;">${item.title}</div>
                        ${isDone ? `<button class="btn-done">✓ Completed</button>` : 
                        `<button class="btn-red" style="padding:8px; font-size:0.75rem;" onclick="markAsDone('${item.title}','${item.image}')">Mark as Done</button>`}
                    </div>
                </div>`;
        });
    }

    // --- AUTHENTICATION ---
    window.handleLogin = () => {
        const e = document.getElementById('email').value;
        const p = document.getElementById('password').value;
        if(!e || !p) return alert("Please fill in email and password");
        signInWithEmailAndPassword(auth, e, p).catch(err => alert("Login Failed: " + err.message));
    };

    window.handleSignUp = () => {
        const e = document.getElementById('email').value;
        const p = document.getElementById('password').value;
        if(!e || !p) return alert("Please fill in email and password");
        createUserWithEmailAndPassword(auth, e, p).then(() => alert("Signed up successfully!")).catch(err => alert(err.message));
    };

    window.logout = () => {
        signOut(auth).then(() => {
            document.getElementById('user-nav').innerHTML = ""; 
            location.reload();
        });
    };

    // --- PROFILE MANAGEMENT ---
    window.openModal = () => { document.getElementById('profile-modal').style.display='flex'; };
    window.closeModal = () => { document.getElementById('profile-modal').style.display='none'; };

    window.saveProfile = async () => {
        const file = document.getElementById('upload-file').files[0];
        const nickname = document.getElementById('nick-input').value;
        let url = document.getElementById('preview-avatar').src;

        try {
            if(file) {
                const sRef = ref(storage, `profiles/${auth.currentUser.uid}`);
                await uploadBytes(sRef, file);
                url = await getDownloadURL(sRef);
            }
            await setDoc(doc(db, "users", auth.currentUser.uid), { nickname: nickname, avatar: url }, {merge:true});
            alert("Profile updated successfully!");
            location.reload();
        } catch (e) { alert("Save error: " + e.message); }
    };

    // --- USER ACTIVITY ---
    window.markAsDone = async (t, i) => {
        try {
            await addDoc(collection(db, "user_watched"), { 
                uid: auth.currentUser.uid, 
                title: t, 
                image: i,
                timestamp: new Date()
            });
            loadUserExperience(auth.currentUser.uid);
        } catch(e) { alert(e.message); }
    };

    async function loadUserExperience(uid) {
        // 1. Load Profile Information
        const uDoc = await getDoc(doc(db, "users", uid));
        const uData = uDoc.exists() ? uDoc.data() : { avatar: "https://upload.wikimedia.org/wikipedia/commons/0/0b/Netflix-avatar.png", nickname: "" };
        
        const displayNick = uData.nickname || auth.currentUser.email.split('@')[0];
        document.getElementById('user-nav').innerHTML = `
            <div class="user-profile" onclick="openModal()">
                <span style="font-size:0.85rem; font-weight:500;">${displayNick}</span>
                <img src="${uData.avatar}" class="user-avatar">
            </div>
            <button onclick="logout()" style="background:none; border:1px solid #444; color:#aaa; cursor:pointer; font-size:10px; padding: 4px 8px; border-radius:3px; margin-left:10px;">Logout</button>
        `;
        document.getElementById('preview-avatar').src = uData.avatar;
        document.getElementById('nick-input').value = uData.nickname || "";

        // 2. Load "My List" (Watched Content)
        const qW = query(collection(db, "user_watched"), where("uid", "==", uid));
        const snapW = await getDocs(qW);
        watchedList = [];
        const wDisplay = document.getElementById('watched-display');
        wDisplay.innerHTML = "";
        
        snapW.forEach(doc => {
            const d = doc.data();
            if(!watchedList.includes(d.title)) {
                watchedList.push(d.title);
                wDisplay.innerHTML += `
                    <div class="card">
                        <img src="${d.image}" onerror="this.src='https://via.placeholder.com/300x169?text=Error'">
                        <div class="card-info">
                            <div style="font-size:0.85rem;">${d.title} <span style="color:#2ed573; margin-left:5px;">✓</span></div>
                        </div>
                    </div>`;
            }
        });

        // 3. Load All Content for Home Grid
        const snapA = await getDocs(collection(db, "all_anime"));
        masterData = [];
        snapA.forEach(doc => {
            masterData.push(doc.data());
        });
        renderHome();
    }

    // --- APP INITIALIZER ---
    onAuthStateChanged(auth, user => {
        if(user) {
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            
            // Show Admin Panel if email matches
            if(user.email === ADMIN_EMAIL) {
                document.getElementById('admin-panel').style.display = 'block';
            } else {
                document.getElementById('admin-panel').style.display = 'none';
            }
            
            loadUserExperience(user.uid);
        } else {
            document.getElementById('auth-section').style.display = 'block';
            document.getElementById('main-content').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'none';
            document.getElementById('user-nav').innerHTML = "";
        }
    });

    // Navbar Scroll Effect
    window.onscroll = () => {
        const nav = document.getElementById('navbar');
        window.pageYOffset > 50 ? nav.classList.add('scrolled') : nav.classList.remove('scrolled');
    };
</script>
</body>
</html>
