<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY HUB | Ultimate Entertainment v2</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --netflix-red: #E50914;
            --netflix-black: #141414;
            --card-bg: #181818;
            --nav-height: 70px;
        }

        * { box-sizing: border-box; }
        body {
            font-family: 'Kanit', sans-serif;
            background-color: var(--netflix-black);
            color: white;
            margin: 0; padding: 0;
            overflow-x: hidden;
        }

        /* --- NAVBAR --- */
        nav {
            background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, transparent 100%);
            padding: 0 4%;
            display: flex; align-items: center;
            height: var(--nav-height);
            position: fixed; top: 0; width: 100%;
            z-index: 1000; transition: 0.4s;
        }
        nav.scrolled { background-color: var(--netflix-black); }

        .nav-left { display: flex; align-items: center; gap: 30px; flex-grow: 1; }
        .nav-logo { color: var(--netflix-red); font-size: 1.8rem; font-weight: 700; text-decoration: none; }
        .nav-menu { display: flex; list-style: none; gap: 20px; padding: 0; cursor: pointer; font-size: 0.9rem; color: #e5e5e5; }

        .nav-right { display: flex; align-items: center; gap: 15px; }
        .user-avatar { width: 32px; height: 32px; border-radius: 4px; object-fit: cover; cursor: pointer; }

        /* --- ADMIN PANEL --- */
        #admin-panel {
            display: none; background: #1a1a1a; padding: 25px; border-radius: 12px;
            margin: 90px 4% 20px; border: 1px dashed var(--netflix-red);
        }
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr auto; gap: 10px; align-items: end; }
        .admin-grid label { display: block; font-size: 0.7rem; color: #888; margin-bottom: 5px; }

        /* --- CONTENT --- */
        .container { padding: 40px 4%; margin-top: 50px; }
        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px; margin-bottom: 50px;
        }

        .card {
            background: var(--card-bg); border-radius: 8px; overflow: hidden;
            cursor: pointer; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card:hover { transform: scale(1.05); z-index: 2; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        .card-info { padding: 15px; }

        /* --- DETAIL MODAL (วิธีที่ 2: Grouping) --- */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal-content { background: #181818; width: 90%; max-width: 900px; border-radius: 15px; overflow: hidden; position: relative; max-height: 90vh; display: flex; flex-direction: column; }
        
        .modal-header { padding: 30px; background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent); }
        .season-list { padding: 20px 30px; overflow-y: auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        
        .season-item { background: #222; border-radius: 8px; overflow: hidden; transition: 0.3s; border: 1px solid #333; cursor: pointer; }
        .season-item:hover { border-color: var(--netflix-red); background: #2a2a2a; }
        .season-item img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        .season-body { padding: 12px; text-align: center; }

        /* --- UI ELEMENTS --- */
        .btn-red { background: var(--netflix-red); color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: 600; width: 100%; }
        input, select { padding: 10px; background: #333; border: 1px solid #444; color: white; border-radius: 5px; width: 100%; font-family: 'Kanit'; }
        
        .badge-done { color: #2ed573; font-size: 0.8rem; font-weight: 500; display: block; margin-top: 5px; }

        #auth-section { max-width: 400px; margin: 20vh auto; background: rgba(0,0,0,0.8); padding: 50px; border-radius: 10px; text-align: center; }
    </style>
</head>
<body>

<nav id="navbar">
    <div class="nav-left">
        <a href="#" class="nav-logo" onclick="filterCategory('All')">MY HUB</a>
        <ul class="nav-menu">
            <li onclick="filterCategory('All')">หน้าหลัก</li>
            <li onclick="filterCategory('Movie')">ภาพยนตร์</li>
            <li onclick="filterCategory('Series')">ซีรีส์</li>
            <li onclick="filterCategory('Anime')">อนิเมะ</li>
        </ul>
    </div>
    <div class="nav-right" id="user-nav"></div>
</nav>

<div id="admin-panel">
    <h3 style="margin-top:0; color:var(--netflix-red)">Admin: เพิ่มเนื้อหาใหม่</h3>
    <div class="admin-grid">
        <div>
            <label>ชื่อเรื่องหลัก</label>
            <input type="text" id="adm-title" placeholder="เช่น Spy x Family">
        </div>
        <div>
            <label>URL ปกหลัก</label>
            <input type="text" id="adm-img" placeholder="https://...">
        </div>
        <div>
            <label>ประเภท</label>
            <select id="adm-cat">
                <option value="Anime">Anime</option>
                <option value="Series">Series</option>
                <option value="Movie">Movie</option>
            </select>
        </div>
        <div>
            <label>รายชื่อซีซัน (คั่นด้วยคอมมา)</label>
            <input type="text" id="adm-seasons" placeholder="Season 1, Season 2">
        </div>
        <button class="btn-red" onclick="addToDatabase()">บันทึก</button>
    </div>
</div>

<div class="container">
    <div id="auth-section">
        <h1 style="text-align:left">Sign In</h1>
        <input type="email" id="email" placeholder="Email" style="margin-bottom:15px">
        <input type="password" id="password" placeholder="Password" style="margin-bottom:25px">
        <button class="btn-red" onclick="handleLogin()">Sign In</button>
        <p style="color:#777; margin-top:20px">ใหม่ใช่ไหม? <a href="#" onclick="handleSignUp()" style="color:white">สมัครสมาชิก</a></p>
    </div>

    <div id="main-content" style="display: none;">
        <h3 id="cat-title" style="margin-bottom:25px">รายการแนะนำ</h3>
        <div class="content-grid" id="content-display"></div>
        
        <h3 style="margin-top:50px; border-top: 1px solid #333; padding-top:30px">กำลังดำเนินการ / ดูจบแล้ว</h3>
        <div class="content-grid" id="watched-display"></div>
    </div>
</div>

<div id="detail-modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="modal-main-title" style="margin:0">ชื่อเรื่อง</h2>
            <p style="color:#aaa; margin:5px 0 0 0">เลือกซีซันที่ต้องการบันทึกการดู</p>
            <button onclick="closeModal()" style="position:absolute; right:20px; top:20px; background:none; border:none; color:white; font-size:1.5rem; cursor:pointer;">&times;</button>
        </div>
        <div class="season-list" id="season-container">
            </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, addDoc, getDocs, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyADNWKhUNqKyF19d-2WBHsHQ1uaZIAN8Bg",
        authDomain: "myanimeweb-1e859.firebaseapp.com",
        projectId: "myanimeweb-1e859",
        storageBucket: "myanimeweb-1e859.firebasestorage.app",
        messagingSenderId: "1018346930735",
        appId: "1:1018346930735:web:dd2d015e2a1f0c628b3cda"
    };

    const ADMIN_EMAIL = "tungpanithan1931@gmail.com";
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let masterData = [];
    let watchedList = []; // เก็บ string ในรูปแบบ "Title|Season"

    // --- ADMIN: เพิ่มข้อมูลแบบ Grouping ---
    window.addToDatabase = async () => {
        const title = document.getElementById('adm-title').value;
        const img = document.getElementById('adm-img').value;
        const cat = document.getElementById('adm-cat').value;
        const seasonsRaw = document.getElementById('adm-seasons').value;

        if(!title || !img) return alert("กรุณากรอกข้อมูลให้ครบ");

        // แยกรายชื่อซีซันเป็น Array
        const seasonArray = seasonsRaw ? seasonsRaw.split(',').map(s => s.trim()) : ["Season 1"];

        try {
            await addDoc(collection(db, "all_anime"), {
                title: title,
                image: img,
                category: cat,
                seasons: seasonArray,
                created: new Date()
            });
            alert("บันทึกสำเร็จ!");
            location.reload();
        } catch (e) { alert(e.message); }
    };

    // --- LOGIC: แสดงผลซีซัน (วิธีที่ 2) ---
    window.openDetails = (title) => {
        const item = masterData.find(x => x.title === title);
        const container = document.getElementById('season-container');
        document.getElementById('modal-main-title').innerText = item.title;
        container.innerHTML = "";

        item.seasons.forEach(sName => {
            const isDone = watchedList.includes(`${item.title}|${sName}`);
            container.innerHTML += `
                <div class="season-item" onclick="markAsDone('${item.title}', '${sName}', '${item.image}')">
                    <img src="${item.image}">
                    <div class="season-body">
                        <div style="font-weight:500">${sName}</div>
                        ${isDone ? '<span class="badge-done">✓ ดูจบแล้ว</span>' : '<span style="font-size:0.7rem; color:#666">คลิกเพื่อบันทึก</span>'}
                    </div>
                </div>
            `;
        });
        document.getElementById('detail-modal').style.display = 'flex';
    };

    window.markAsDone = async (mainTitle, seasonName, img) => {
        const checkID = `${mainTitle}|${seasonName}`;
        if(watchedList.includes(checkID)) return;

        try {
            await addDoc(collection(db, "user_watched"), {
                uid: auth.currentUser.uid,
                mainTitle: mainTitle,
                seasonName: seasonName,
                image: img,
                timestamp: new Date()
            });
            alert(`บันทึกการดู ${mainTitle} - ${seasonName} สำเร็จ!`);
            location.reload();
        } catch (e) { alert(e.message); }
    };

    window.closeModal = () => { document.getElementById('detail-modal').style.display = 'none'; };

    // --- RENDERING ---
    window.filterCategory = (cat) => {
        const display = document.getElementById('content-display');
        display.innerHTML = "";
        const filtered = cat === 'All' ? masterData : masterData.filter(x => x.category === cat);
        
        filtered.forEach(item => {
            display.innerHTML += `
                <div class="card" onclick="openDetails('${item.title}')">
                    <img src="${item.image}">
                    <div class="card-info">
                        <div style="font-size:0.7rem; color:var(--netflix-red); font-weight:600; text-transform:uppercase">${item.category}</div>
                        <div style="margin-top:5px; font-weight:500">${item.title}</div>
                        <div style="font-size:0.8rem; color:#777; margin-top:5px">${item.seasons.length} Seasons</div>
                    </div>
                </div>`;
        });
    };

    async function loadData(uid) {
        // 1. โหลดข้อมูลที่ดูแล้ว
        const qW = query(collection(db, "user_watched"), where("uid", "==", uid), orderBy("timestamp", "desc"));
        const snapW = await getDocs(qW);
        watchedList = [];
        const wDisplay = document.getElementById('watched-display');
        wDisplay.innerHTML = "";

        snapW.forEach(doc => {
            const d = doc.data();
            watchedList.push(`${d.mainTitle}|${d.seasonName}`);
            wDisplay.innerHTML += `
                <div class="card" style="opacity:0.8; transform: scale(0.95)">
                    <img src="${d.image}">
                    <div class="card-info">
                        <div style="font-weight:500">${d.mainTitle}</div>
                        <div style="font-size:0.8rem; color:#2ed573">${d.seasonName} ✓</div>
                    </div>
                </div>`;
        });

        // 2. โหลดข้อมูลทั้งหมด
        const qA = query(collection(db, "all_anime"), orderBy("created", "desc"));
        const snapA = await getDocs(qA);
        masterData = [];
        snapA.forEach(doc => masterData.push(doc.data()));
        
        // 3. แสดงผล Navbar Profile
        const uDoc = await getDoc(doc(db, "users", uid));
        const uData = uDoc.exists() ? uDoc.data() : { avatar: "https://upload.wikimedia.org/wikipedia/commons/0/0b/Netflix-avatar.png" };
        document.getElementById('user-nav').innerHTML = `
            <img src="${uData.avatar}" class="user-avatar" onclick="alert('ไปที่ตั้งค่าโปรไฟล์')">
            <button onclick="logout()" style="background:none; border:none; color:red; cursor:pointer; font-size:12px">Logout</button>
        `;

        filterCategory('All');
    }

    // --- AUTH ---
    window.handleLogin = () => {
        const e = document.getElementById('email').value;
        const p = document.getElementById('password').value;
        signInWithEmailAndPassword(auth, e, p).catch(err => alert(err.message));
    };

    window.handleSignUp = () => {
        const e = document.getElementById('email').value;
        const p = document.getElementById('password').value;
        createUserWithEmailAndPassword(auth, e, p).then(() => alert("สมัครสมาชิกสำเร็จ!"));
    };

    window.logout = () => signOut(auth).then(() => location.reload());

    onAuthStateChanged(auth, user => {
        if(user) {
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            if(user.email === ADMIN_EMAIL) document.getElementById('admin-panel').style.display = 'block';
            loadData(user.uid);
        } else {
            document.getElementById('auth-section').style.display = 'block';
            document.getElementById('main-content').style.display = 'none';
        }
    });
</script>
</body>
</html>
