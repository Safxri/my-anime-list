<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY HUB | Premium Streaming v4</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --netflix-red: #E50914; --netflix-black: #141414; --card-bg: #181818; --nav-height: 70px; }
        * { box-sizing: border-box; }
        body { font-family: 'Kanit', sans-serif; background-color: var(--netflix-black); color: white; margin: 0; padding: 0; }

        /* --- NAVBAR --- */
        nav {
            background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, transparent 100%);
            padding: 0 4%; display: flex; align-items: center; height: var(--nav-height);
            position: fixed; top: 0; width: 100%; z-index: 1000; transition: 0.4s;
        }
        nav.scrolled { background-color: var(--netflix-black); box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .nav-left { display: flex; align-items: center; gap: 30px; flex-grow: 1; }
        .nav-logo { color: var(--netflix-red); font-size: 1.8rem; font-weight: 700; text-decoration: none; }
        .nav-menu { display: flex; list-style: none; gap: 20px; padding: 0; cursor: pointer; font-size: 0.9rem; color: #e5e5e5; }
        .nav-right { display: flex; align-items: center; gap: 15px; }
        .user-profile-nav { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .user-avatar { width: 32px; height: 32px; border-radius: 4px; object-fit: cover; border: 1px solid #444; }

        /* --- ADMIN PANEL --- */
        #admin-panel { display: none; background: #1a1a1a; padding: 25px; border-radius: 12px; margin: 90px 4% 20px; border: 1px dashed var(--netflix-red); }
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr auto; gap: 10px; align-items: end; }
        .admin-grid input, .admin-grid select { padding: 10px; background: #333; border: 1px solid #444; color: white; border-radius: 5px; }

        /* --- CONTENT --- */
        .container { padding: 40px 4%; margin-top: 50px; }
        .content-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 25px; margin-bottom: 50px; }
        .card { background: var(--card-bg); border-radius: 8px; overflow: hidden; position: relative; transition: 0.3s; cursor: pointer; }
        .card:hover { transform: scale(1.05); z-index: 10; box-shadow: 0 15px 30px rgba(0,0,0,0.6); }
        .card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        .card-info { padding: 15px; }

        /* --- ADMIN TOOLS --- */
        .admin-tools { position: absolute; top: 10px; right: 10px; display: flex; gap: 5px; z-index: 15; }
        .btn-tool { background: rgba(0,0,0,0.8); color: white; border: 1px solid #444; padding: 4px 8px; border-radius: 4px; font-size: 10px; cursor: pointer; }

        /* --- MODALS --- */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal-content { background: #181818; width: 90%; max-width: 850px; border-radius: 15px; overflow: hidden; position: relative; max-height: 85vh; display: flex; flex-direction: column; }
        .season-list { padding: 20px; overflow-y: auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .season-item { background: #222; border-radius: 8px; overflow: hidden; border: 1px solid #333; text-align: center; cursor: pointer; }
        .season-item img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }

        .btn-red { background: var(--netflix-red); color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; font-weight: 600; width: 100%; }
        #auth-section { max-width: 400px; margin: 20vh auto; background: rgba(0,0,0,0.85); padding: 50px; border-radius: 10px; text-align: center; }
    </style>
</head>
<body>

<nav id="navbar">
    <div class="nav-left">
        <a href="#" class="nav-logo">MY HUB</a>
        <ul class="nav-menu">
            <li onclick="filterCategory('All')">หน้าหลัก</li>
            <li onclick="filterCategory('Movie')">ภาพยนตร์</li>
            <li onclick="filterCategory('Series')">ซีรีส์</li>
            <li onclick="filterCategory('Anime')">อนิเมะ</li>
        </ul>
    </div>
    <div class="nav-right" id="user-nav">
        </div>
</nav>

<div id="admin-panel">
    <h3 style="color:var(--netflix-red); margin-top:0;">เพิ่มเรื่องใหม่</h3>
    <div class="admin-grid">
        <input type="text" id="adm-title" placeholder="ชื่อเรื่อง">
        <input type="text" id="adm-img" placeholder="URL รูปปก (16:9)">
        <select id="adm-cat">
            <option value="Anime">Anime</option>
            <option value="Series">Series</option>
            <option value="Movie">Movie</option>
        </select>
        <input type="text" id="adm-seasons" placeholder="SS1, SS2 (คั่นด้วยคอมมา)">
        <button class="btn-red" onclick="addToDatabase()">บันทึก</button>
    </div>
</div>

<div class="container">
    <div id="auth-section">
        <h1>Sign In</h1>
        <input type="email" id="email" placeholder="Email" style="margin-bottom:15px; padding:12px; width:100%; background:#333; border:none; color:white;">
        <input type="password" id="password" placeholder="Password" style="margin-bottom:25px; padding:12px; width:100%; background:#333; border:none; color:white;">
        <button class="btn-red" onclick="handleLogin()">Sign In</button>
    </div>

    <div id="main-content" style="display: none;">
        <h2 id="cat-title">รายการแนะนำ</h2>
        <div class="content-grid" id="content-display"></div>
        <h2 style="color: #666; border-top: 1px solid #333; padding-top: 30px;">รายการที่ดูจบแล้ว</h2>
        <div class="content-grid" id="watched-display"></div>
    </div>
</div>

<div id="detail-modal" class="modal">
    <div class="modal-content">
        <div style="padding: 30px; border-bottom: 1px solid #333;">
            <h2 id="modal-title" style="margin:0"></h2>
            <button onclick="closeModal()" style="position:absolute; right:20px; top:20px; background:none; border:none; color:white; font-size:24px; cursor:pointer;">&times;</button>
        </div>
        <div class="season-list" id="season-container"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, collection, addDoc, getDocs, query, where, orderBy, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyADNWKhUNqKyF19d-2WBHsHQ1uaZIAN8Bg",
        authDomain: "myanimeweb-1e859.firebaseapp.com",
        projectId: "myanimeweb-1e859",
        storageBucket: "myanimeweb-1e859.firebasestorage.app",
        messagingSenderId: "1018346930735",
        appId: "1:1018346930735:web:dd2d015e2a1f0c628b3cda"
    };

    const ADMIN_EMAIL = "tungpanithan1931@gmail.com";
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let masterData = [];
    let watchedList = [];

    // --- 1. แก้ไขปัญหาโปรไฟล์และชื่อไม่ขึ้น ---
    async function loadUserProfile(user) {
        try {
            const uDoc = await getDoc(doc(db, "users", user.uid));
            let userData = {
                nickname: user.email.split('@')[0], // Default: ชื่อหน้า @
                avatar: "https://upload.wikimedia.org/wikipedia/commons/0/0b/Netflix-avatar.png"
            };

            if (uDoc.exists()) {
                const data = uDoc.data();
                if (data.nickname) userData.nickname = data.nickname;
                if (data.avatar) userData.avatar = data.avatar;
            }

            document.getElementById('user-nav').innerHTML = `
                <div class="user-profile-nav" onclick="alert('ยินดีต้อนรับ ${userData.nickname}')">
                    <span style="font-size:0.85rem;">${userData.nickname}</span>
                    <img src="${userData.avatar}" class="user-avatar">
                </div>
                <button onclick="logout()" style="background:none; border:none; color:#777; font-size:11px; cursor:pointer;">LOGOUT</button>
            `;
        } catch (e) { console.error("Profile Error:", e); }
    }

    // --- 2. โหลดข้อมูลการ์ด (ต้องการ Index) ---
    async function loadMainData(uid) {
        try {
            // โหลดรายการที่ดูแล้ว
            const qW = query(collection(db, "user_watched"), where("uid", "==", uid));
            const snapW = await getDocs(qW);
            watchedList = [];
            const wDisplay = document.getElementById('watched-display');
            wDisplay.innerHTML = "";
            snapW.forEach(d => {
                const data = d.data();
                watchedList.push(`${data.mainTitle}|${data.seasonName}`);
                wDisplay.innerHTML += `
                    <div class="card" style="opacity:0.6; transform:scale(0.9);">
                        <img src="${data.image}">
                        <div class="card-info"><div>${data.mainTitle}</div><small style="color:#2ed573">${data.seasonName} ✓</small></div>
                    </div>`;
            });

            // โหลดข้อมูลทั้งหมด
            const qA = query(collection(db, "all_anime"), orderBy("created", "desc"));
            const snapA = await getDocs(qA);
            masterData = [];
            snapA.forEach(d => masterData.push({ id: d.id, ...d.data() }));
            
            filterCategory('All');
        } catch (e) { 
            console.error("Data Error (Check Index):", e); 
            if(e.message.includes("requires an index")) {
                alert("กรุณากดสร้าง Index ใน Console (F12) เพื่อให้ข้อมูลแสดงผล");
            }
        }
    }

    window.filterCategory = (cat) => {
        const display = document.getElementById('content-display');
        display.innerHTML = "";
        const filtered = cat === 'All' ? masterData : masterData.filter(x => x.category === cat);
        const isAdmin = auth.currentUser.email === ADMIN_EMAIL;

        filtered.forEach(item => {
            display.innerHTML += `
                <div class="card">
                    ${isAdmin ? `<div class="admin-tools">
                        <button class="btn-tool" onclick="editSeasons('${item.id}')">Edit</button>
                        <button class="btn-tool" onclick="deleteItem('${item.id}')" style="color:red">Del</button>
                    </div>` : ''}
                    <img src="${item.image}" onclick="openDetails('${item.id}')">
                    <div class="card-info" onclick="openDetails('${item.id}')">
                        <div style="color:var(--netflix-red); font-size:10px; font-weight:bold;">${item.category}</div>
                        <div style="font-weight:500; margin-top:5px;">${item.title}</div>
                    </div>
                </div>`;
        });
    };

    window.openDetails = (id) => {
        const item = masterData.find(x => x.id === id);
        document.getElementById('modal-title').innerText = item.title;
        const container = document.getElementById('season-container');
        container.innerHTML = "";

        item.seasons.forEach(s => {
            const isDone = watchedList.includes(`${item.title}|${s}`);
            container.innerHTML += `
                <div class="season-item" onclick="markDone('${item.id}', '${s}')">
                    <img src="${item.image}">
                    <div style="padding:10px;">
                        <div style="font-size:14px;">${s}</div>
                        ${isDone ? '<span style="color:#2ed573; font-size:11px;">ชมแล้ว</span>' : '<span style="color:#666; font-size:11px;">คลิกเพื่อบันทึก</span>'}
                    </div>
                </div>`;
        });
        document.getElementById('detail-modal').style.display = 'flex';
    };

    window.markDone = async (id, sName) => {
        const item = masterData.find(x => x.id === id);
        if(watchedList.includes(`${item.title}|${sName}`)) return;
        await addDoc(collection(db, "user_watched"), {
            uid: auth.currentUser.uid,
            mainTitle: item.title,
            seasonName: sName,
            image: item.image,
            timestamp: new Date()
        });
        location.reload();
    };

    window.editSeasons = async (id) => {
        const item = masterData.find(x => x.id === id);
        const newRaw = prompt("แก้ไขรายชื่อซีซัน (คั่นด้วยคอมมา)", item.seasons.join(', '));
        if(newRaw !== null) {
            await updateDoc(doc(db, "all_anime", id), { seasons: newRaw.split(',').map(s => s.trim()) });
            location.reload();
        }
    };

    window.deleteItem = async (id) => { if(confirm("ลบเรื่องนี้?")) { await deleteDoc(doc(db, "all_anime", id)); location.reload(); } };
    window.closeModal = () => document.getElementById('detail-modal').style.display = 'none';
    window.logout = () => signOut(auth).then(() => location.reload());

    window.addToDatabase = async () => {
        const t = document.getElementById('adm-title').value;
        const i = document.getElementById('adm-img').value;
        const c = document.getElementById('adm-cat').value;
        const s = document.getElementById('adm-seasons').value;
        if(!t || !i) return alert("กรุณากรอกข้อมูล");
        await addDoc(collection(db, "all_anime"), { 
            title: t, image: i, category: c, 
            seasons: s ? s.split(',').map(x => x.trim()) : ["Standard"],
            created: new Date() 
        });
        location.reload();
    };

    window.handleLogin = () => {
        const e = document.getElementById('email').value;
        const p = document.getElementById('password').value;
        signInWithEmailAndPassword(auth, e, p).catch(err => alert(err.message));
    };

    onAuthStateChanged(auth, user => {
        if(user) {
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            if(user.email === ADMIN_EMAIL) document.getElementById('admin-panel').style.display = 'block';
            loadUserProfile(user);
            loadMainData(user.uid);
        } else {
            document.getElementById('auth-section').style.display = 'block';
        }
    });
</script>
</body>
</html>
