<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY HUB | v31 Total System</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --netflix-red: #E50914; --netflix-black: #141414; --nav-height: 70px; }
        * { box-sizing: border-box; }
        body { font-family: 'Kanit', sans-serif; background-color: var(--netflix-black); color: white; margin: 0; padding: 0; overflow-x: hidden; }

        /* --- NAVBAR: Pixel Perfect Search --- */
        nav { background: rgba(0,0,0,0.9); padding: 0 4%; display: flex; align-items: center; justify-content: space-between; height: var(--nav-height); position: fixed; top: 0; width: 100%; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .nav-left { display: flex; align-items: center; gap: 30px; }
        .nav-logo { color: var(--netflix-red); font-size: 1.8rem; font-weight: 700; text-decoration: none; cursor: pointer; }
        .nav-menu { display: flex; list-style: none; gap: 20px; padding: 0; margin: 0; cursor: pointer; color: #e5e5e5; font-size: 0.9rem; }
        .nav-menu li:hover { color: white; }
        
        .nav-right-group { display: flex; align-items: center; gap: 20px; }
        .search-box { position: relative; width: 280px; display: flex; align-items: center; }
        .search-box input { background: rgba(255,255,255,0.1); border: 1px solid #444; border-radius: 20px; padding: 8px 15px 8px 42px; width: 100%; color: white; outline: none; font-size: 0.85rem; height: 36px; }
        .search-icon { position: absolute; left: 14px; display: flex; align-items: center; pointer-events: none; font-size: 1rem; color: #aaa; }
        .user-box { display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 0.85rem; }
        .user-img { width: 32px; height: 32px; border-radius: 4px; object-fit: cover; }

        /* --- CONTENT: Full Screen Grid --- */
        .container { padding: 90px 4% 40px; }
        .section-title { font-size: 1.8rem; margin: 30px 0 20px; border-left: 5px solid var(--netflix-red); padding-left: 15px; }
        .content-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        
        .card { position: relative; background: #222; border-radius: 12px; overflow: hidden; aspect-ratio: 2/3; cursor: pointer; transition: 0.4s; }
        .card:hover { transform: scale(1.03); z-index: 5; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .card-overlay { position: absolute; bottom: 0; width: 100%; background: linear-gradient(transparent, rgba(0,0,0,1)); padding: 40px 10px 15px; text-align: center; }
        .card-title { font-size: 1.2rem; font-weight: 500; }

        /* --- ADMIN & TOOLS --- */
        .admin-controls { position: absolute; top: 10px; right: 10px; display: flex; gap: 5px; z-index: 10; }
        .btn-s { padding: 4px 8px; font-size: 10px; border: none; border-radius: 4px; cursor: pointer; color: white; }
        #admin-panel { display: none; background: #1a1a1a; padding: 25px; border-radius: 12px; margin-bottom: 30px; border: 1px solid #333; }
        .btn-clear-history { position: absolute; top: 10px; right: 10px; background: var(--netflix-red); color: white; border: none; border-radius: 50%; width: 25px; height: 25px; cursor: pointer; z-index: 20; display: none; }
        .card:hover .btn-clear-history { display: flex; align-items: center; justify-content: center; }

        /* --- AUTH --- */
        .auth-card { max-width: 400px; margin: 15vh auto; background: rgba(0,0,0,0.9); padding: 50px; border-radius: 8px; text-align: center; }
        .btn-red { background: var(--netflix-red); color: white; border: none; padding: 12px; border-radius: 4px; cursor: pointer; width: 100%; margin-top: 10px; font-weight: 600; }
        input, select { padding: 12px; background: #333; border: 1px solid #444; color: white; border-radius: 4px; width: 100%; margin-bottom: 10px; font-family: 'Kanit'; }

        /* --- MODALS --- */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; z-index: 3000; }
        .modal-content { background: #181818; width: 95%; max-width: 900px; padding: 30px; border-radius: 15px; position: relative; }
        .season-card { background: #222; border-radius: 8px; overflow: hidden; border: 2px solid transparent; transition: 0.2s; position: relative; }
        .season-card.watched { border-color: #2ed573; }
        .check-mark { position: absolute; top: 8px; right: 8px; background: #2ed573; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 12px; }
    </style>
</head>
<body>

<nav>
    <div class="nav-left">
        <a class="nav-logo" onclick="location.reload()">MY HUB</a>
        <ul class="nav-menu">
            <li onclick="showHome()">หน้าหลัก</li>
            <li onclick="filterCat('Movie')">หนัง</li>
            <li onclick="filterCat('Series')">ซีรีส์</li>
            <li onclick="filterCat('Anime')">อนิเมะ</li>
            <li onclick="showOnlyWatched()" style="color:#2ed573; font-weight:500;">ประวัติการดู</li>
        </ul>
    </div>
    <div class="nav-right-group" id="nav-right" style="display:none;">
        <div class="search-box">
            <div class="search-icon">🔍</div>
            <input type="text" id="search-input" placeholder="ค้นหาชื่อเรื่อง..." onkeyup="handleSearch()">
        </div>
        <div id="user-display"></div>
    </div>
</nav>

<div id="main-ui" class="container" style="display:none;">
    <div id="admin-panel">
        <h3 id="adm-header" style="color:var(--netflix-red); margin:0 0 15px 0;">จัดการข้อมูล</h3>
        <div style="display:grid; grid-template-columns: 2fr 2fr 1fr auto; gap:10px;">
            <input type="text" id="adm-title" placeholder="ชื่อเรื่อง">
            <input type="text" id="adm-img" placeholder="URL ปกหลัก">
            <select id="adm-cat"><option value="Anime">Anime</option><option value="Movie">Movie</option><option value="Series">Series</option></select>
            <button class="btn-red" id="adm-save-btn" onclick="saveToDB()" style="margin:0; width:100px;">บันทึก</button>
        </div>
        <div id="season-inputs" style="margin-top:10px;"></div>
        <button onclick="addSField()" style="background:none; color:#888; border:1px dashed #444; width:100%; padding:10px; margin-top:10px; cursor:pointer;">+ เพิ่มซีซันย่อย</button>
    </div>

    <div id="watched-section" style="display:none;">
        <h2 class="section-title" style="color:#2ed573;">รับชมต่อ</h2>
        <div class="content-grid" id="watched-grid"></div>
    </div>

    <div id="main-area">
        <h2 class="section-title" id="main-label">รายการแนะนำ</h2>
        <div class="content-grid" id="main-grid"></div>
    </div>
</div>

<div id="auth-ui" class="auth-card">
    <h1 id="auth-title">Sign In</h1>
    <input type="email" id="email" placeholder="อีเมล">
    <input type="password" id="password" placeholder="รหัสผ่าน">
    <button class="btn-red" onclick="runAuth()" id="auth-btn">เข้าสู่ระบบ</button>
    <p style="margin-top:20px; color:#aaa; cursor:pointer;" onclick="toggleAuth()" id="auth-switch">ยังไม่มีบัญชี? <b>สมัครสมาชิก</b></p>
</div>

<div id="detail-modal" class="modal">
    <div class="modal-content">
        <h2 id="m-title" style="margin-bottom:20px;"></h2>
        <div id="m-list" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(160px, 1fr)); gap:15px;"></div>
        <button class="btn-red" onclick="closeModal('detail-modal')" style="width:100px; margin-top:20px;">ปิด</button>
    </div>
</div>

<div id="profile-modal" class="modal">
    <div class="modal-content" style="max-width:400px; text-align:center;">
        <h3>ตั้งค่าโปรไฟล์</h3>
        <input type="text" id="p-nick" placeholder="ชื่อเล่น">
        <input type="text" id="p-ava" placeholder="URL รูป">
        <button class="btn-red" onclick="saveProfile()">บันทึก</button>
        <button class="btn-red" style="background:#444;" onclick="triggerLogout()">ออกจากระบบ</button>
        <button class="btn-red" style="background:none;" onclick="closeModal('profile-modal')">ปิด</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, collection, addDoc, getDocs, query, where, orderBy, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyADNWKhUNqKyF19d-2WBHsHQ1uaZIAN8Bg",
        authDomain: "myanimeweb-1e859.firebaseapp.com",
        projectId: "myanimeweb-1e859",
        storageBucket: "myanimeweb-1e859.firebasestorage.app",
        messagingSenderId: "1018346930735",
        appId: "1:1018346930735:web:dd2d015e2a1f0c628b3cda"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const ADMIN_MAIL = "tungpanithan1931@gmail.com";

    let allData = [], watchedList = [], isReg = false, editId = null;

    // --- AUTH ---
    window.toggleAuth = () => {
        isReg = !isReg;
        document.getElementById('auth-title').innerText = isReg ? "Sign Up" : "Sign In";
        document.getElementById('auth-btn').innerText = isReg ? "สมัครสมาชิก" : "เข้าสู่ระบบ";
        document.getElementById('auth-switch').innerHTML = isReg ? "มีบัญชีอยู่แล้ว? <b>เข้าสู่ระบบ</b>" : "ยังไม่มีบัญชี? <b>สมัครสมาชิก</b>";
    };

    window.runAuth = () => {
        const m = document.getElementById('email').value, p = document.getElementById('password').value;
        if(isReg) createUserWithEmailAndPassword(auth, m, p).catch(e => alert(e.message));
        else signInWithEmailAndPassword(auth, m, p).catch(e => alert("อีเมลหรือรหัสผ่านผิด"));
    };

    window.triggerLogout = () => signOut(auth).then(() => location.reload());

    onAuthStateChanged(auth, async user => {
        if(user) {
            document.getElementById('auth-ui').style.display = 'none';
            document.getElementById('main-ui').style.display = 'block';
            document.getElementById('nav-right').style.display = 'flex';
            if(user.email === ADMIN_MAIL) document.getElementById('admin-panel').style.display = 'block';
            setupUser(user); loadData(); loadWatched(user.uid);
        } else {
            document.getElementById('auth-ui').style.display = 'block';
            document.getElementById('main-ui').style.display = 'none';
        }
    });

    // --- DATA ---
    async function setupUser(user) {
        const d = await getDoc(doc(db, "users", user.uid));
        let nick = user.email.split('@')[0], ava = "https://upload.wikimedia.org/wikipedia/commons/0/0b/Netflix-avatar.png";
        if(d.exists()) { nick = d.data().nickname; ava = d.data().avatar; }
        document.getElementById('user-display').innerHTML = `<div class="user-box" onclick="openProfile('${nick}','${ava}')"><span>${nick}</span><img src="${ava}" class="user-img"></div>`;
    }

    async function loadData() {
        const s = await getDocs(query(collection(db, "all_anime"), orderBy("created", "desc")));
        allData = s.docs.map(d => ({ id: d.id, ...d.data() }));
        render(allData);
    }

    async function loadWatched(uid) {
        const q = query(collection(db, "user_watched"), where("uid", "==", uid), orderBy("timestamp", "desc"));
        const s = await getDocs(q);
        const g = document.getElementById('watched-grid'); g.innerHTML = "";
        watchedList = [];
        if(!s.empty) {
            document.getElementById('watched-section').style.display = 'block';
            s.forEach(d => {
                const data = d.data(); watchedList.push({ id: d.id, key: `${data.mainTitle}|${data.seasonName}` });
                g.innerHTML += `<div class="card" style="scale:0.95;"><button class="btn-clear-history" onclick="removeHistory('${d.id}')">✕</button><img src="${data.image}"><div class="card-overlay">${data.mainTitle}</div></div>`;
            });
        }
    }

    function render(list) {
        const g = document.getElementById('main-grid'), isAdmin = auth.currentUser?.email === ADMIN_MAIL;
        g.innerHTML = "";
        list.forEach(item => {
            g.innerHTML += `
                <div class="card">
                    ${isAdmin ? `<div class="admin-controls">
                        <button class="btn-s" style="background:#4dabf7" onclick="editItem('${item.id}')">แก้ไข</button>
                        <button class="btn-s" style="background:#ff4d4d" onclick="deleteItem('${item.id}')">ลบ</button>
                    </div>` : ''}
                    <img src="${item.image}" onclick="openDetail('${item.id}')">
                    <div class="card-overlay" onclick="openDetail('${item.id}')"><div class="card-title">${item.title}</div></div>
                </div>`;
        });
    }

    // --- ACTIONS ---
    window.saveToDB = async () => {
        const sns = document.querySelectorAll('.sn'), sis = document.querySelectorAll('.si'); let seasons = [];
        sns.forEach((s, i) => { if(s.value) seasons.push({ name: s.value, image: sis[i].value }); });
        const data = { title: document.getElementById('adm-title').value, image: document.getElementById('adm-img').value, category: document.getElementById('adm-cat').value, seasons, created: new Date() };
        if(editId) await updateDoc(doc(db, "all_anime", editId), data);
        else await addDoc(collection(db, "all_anime"), data);
        location.reload();
    };

    window.editItem = (id) => {
        editId = id; const item = allData.find(x => x.id === id);
        document.getElementById('adm-header').innerText = "แก้ไข: " + item.title;
        document.getElementById('adm-title').value = item.title;
        document.getElementById('adm-img').value = item.image;
        document.getElementById('adm-cat').value = item.category;
        document.getElementById('season-inputs').innerHTML = "";
        if(item.seasons) item.seasons.forEach(s => addSField(s.name, s.image));
        document.getElementById('adm-save-btn').innerText = "อัปเดต"; window.scrollTo(0,0);
    };

    window.addSField = (n="", i="") => {
        const d = document.createElement('div'); d.style = "display:grid; grid-template-columns:1fr 1fr auto; gap:10px; margin-top:5px;";
        d.innerHTML = `<input type="text" class="sn" placeholder="ซีซัน" value="${n}"><input type="text" class="si" placeholder="URL ปก" value="${i}"><button onclick="this.parentElement.remove()">X</button>`;
        document.getElementById('season-inputs').appendChild(d);
    };

    window.openDetail = (id) => {
        const item = allData.find(x => x.id === id); document.getElementById('m-title').innerText = item.title;
        const l = document.getElementById('m-list'); l.innerHTML = "";
        const keys = watchedList.map(x => x.key);
        item.seasons?.forEach(s => {
            const isW = keys.includes(`${item.title}|${s.name}`);
            l.innerHTML += `<div class="season-card ${isW?'watched':''}" onclick="markWatched('${item.title}','${s.name}','${s.image}')">${isW?'<div class="check-mark">✓</div>':''}<img src="${s.image}" style="width:100%; aspect-ratio:2/3; object-fit:cover;"><div style="padding:10px;">${s.name}</div></div>`;
        });
        document.getElementById('detail-modal').style.display = 'flex';
    };

    window.markWatched = async (m, s, i) => {
        await addDoc(collection(db, "user_watched"), { uid: auth.currentUser.uid, mainTitle: m, seasonName: s, image: i, timestamp: new Date() });
        loadWatched(auth.currentUser.uid); closeModal('detail-modal');
    };

    window.removeHistory = async (id) => { await deleteDoc(doc(db, "user_watched", id)); loadWatched(auth.currentUser.uid); };
    window.deleteItem = async (id) => { if(confirm('ลบ?')) { await deleteDoc(doc(db, "all_anime", id)); location.reload(); } };
    window.handleSearch = () => render(allData.filter(x => x.title.toLowerCase().includes(document.getElementById('search-input').value.toLowerCase())));
    window.filterCat = (c) => render(allData.filter(x => x.category === c));
    window.showOnlyWatched = () => { document.getElementById('main-area').style.display='none'; document.getElementById('watched-section').style.display='block'; };
    window.showHome = () => { document.getElementById('main-area').style.display='block'; render(allData); };
    window.closeModal = (id) => document.getElementById(id).style.display = 'none';
    window.openProfile = (n, a) => { document.getElementById('p-nick').value = n; document.getElementById('p-ava').value = a; document.getElementById('profile-modal').style.display = 'flex'; };
    window.saveProfile = async () => { await setDoc(doc(db, "users", auth.currentUser.uid), { nickname: document.getElementById('p-nick').value, avatar: document.getElementById('p-ava').value }); location.reload(); };
</script>
</body>
</html>
