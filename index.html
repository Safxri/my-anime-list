<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY HUB | v32 Pixel Perfect</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --netflix-red: #E50914; --netflix-black: #141414; --nav-height: 75px; }
        * { box-sizing: border-box; }
        body { font-family: 'Kanit', sans-serif; background-color: var(--netflix-black); color: white; margin: 0; padding: 0; overflow-x: hidden; }

        /* --- NAVBAR: ปรับความสูงและ Alignment ใหม่ --- */
        nav { 
            background: rgba(0,0,0,0.95); 
            padding: 0 4%; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            height: var(--nav-height); 
            position: fixed; 
            top: 0; 
            width: 100%; 
            z-index: 1000; 
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .nav-left { display: flex; align-items: center; gap: 35px; }
        .nav-logo { color: var(--netflix-red); font-size: 1.8rem; font-weight: 700; text-decoration: none; cursor: pointer; }
        .nav-menu { display: flex; list-style: none; gap: 20px; padding: 0; margin: 0; cursor: pointer; color: #e5e5e5; font-size: 0.95rem; }
        .nav-menu li:hover { color: white; }
        
        .nav-right-group { display: flex; align-items: center; gap: 25px; }

        /* --- SEARCH BOX: แก้ไขให้แว่นขยายตรงกับข้อความ 100% --- */
        .search-box { 
            position: relative; 
            width: 320px; 
            height: 40px; /* กำหนดความสูงที่แน่นอน */
            display: flex; 
            align-items: center; 
        }
        .search-box input { 
            background: rgba(255,255,255,0.12); 
            border: 1px solid #444; 
            border-radius: 25px; 
            padding: 0 15px 0 45px; /* เว้นซ้าย 45px */
            width: 100%; 
            height: 100%; /* ให้เต็มความสูงของ search-box */
            color: white; 
            outline: none; 
            font-size: 0.9rem; 
            transition: 0.3s;
            display: flex;
            align-items: center;
        }
        .search-icon { 
            position: absolute; 
            left: 16px; 
            height: 100%; /* ให้ไอคอนสูงเท่ากล่อง */
            display: flex;
            align-items: center; /* จัดกึ่งกลางแนวตั้งแม่นยำ */
            justify-content: center;
            pointer-events: none;
            font-size: 1.1rem;
            color: #bbb;
            line-height: 1; /* ป้องกัน line-height ของฟอนต์ทำไอคอนเบี้ยว */
        }

        .user-box { display: flex; align-items: center; gap: 12px; cursor: pointer; color: #ddd; }
        .user-img { width: 34px; height: 34px; border-radius: 4px; object-fit: cover; }

        /* --- CONTENT & GRID --- */
        .container { padding: 110px 4% 40px; }
        .section-title { font-size: 1.8rem; margin: 40px 0 25px; border-left: 5px solid var(--netflix-red); padding-left: 20px; }
        .content-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        
        .card { position: relative; background: #222; border-radius: 12px; overflow: hidden; aspect-ratio: 2/3; cursor: pointer; transition: 0.4s; }
        .card:hover { transform: scale(1.05); z-index: 5; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .card-overlay { position: absolute; bottom: 0; width: 100%; background: linear-gradient(transparent, rgba(0,0,0,1)); padding: 50px 10px 20px; text-align: center; font-size: 1.2rem; font-weight: 500; }

        /* --- ADMIN, AUTH & MODALS --- */
        #admin-panel { display: none; background: #1a1a1a; padding: 30px; border-radius: 15px; margin-bottom: 40px; border: 1px solid #333; }
        .btn-red { background: var(--netflix-red); color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: 600; }
        .auth-card { max-width: 450px; margin: 15vh auto; background: rgba(0,0,0,0.9); padding: 60px; border-radius: 10px; text-align: center; }
        input, select { padding: 12px; background: #333; border: 1px solid #444; color: white; border-radius: 6px; width: 100%; margin-bottom: 12px; font-family: 'Kanit'; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); align-items: center; justify-content: center; z-index: 3000; }
        .modal-content { background: #181818; width: 95%; max-width: 900px; padding: 40px; border-radius: 20px; }
        .btn-clear-history { position: absolute; top: 12px; right: 12px; background: var(--netflix-red); color: white; border: none; border-radius: 50%; width: 28px; height: 28px; cursor: pointer; z-index: 20; display: none; }
        .card:hover .btn-clear-history { display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<nav>
    <div class="nav-left">
        <a class="nav-logo" onclick="location.reload()">MY HUB</a>
        <ul class="nav-menu">
            <li onclick="showHome()">หน้าหลัก</li>
            <li onclick="filterCat('Movie')">หนัง</li>
            <li onclick="filterCat('Series')">ซีรีส์</li>
            <li onclick="filterCat('Anime')">อนิเมะ</li>
            <li onclick="showOnlyWatched()" style="color:#2ed573;">ประวัติการดู</li>
        </ul>
    </div>
    <div class="nav-right-group" id="nav-right" style="display:none;">
        <div class="search-box">
            <div class="search-icon">🔍</div>
            <input type="text" id="search-input" placeholder="ค้นหาชื่อเรื่อง..." onkeyup="handleSearch()">
        </div>
        <div id="user-display"></div>
    </div>
</nav>

<div id="main-ui" class="container" style="display:none;">
    <div id="admin-panel">
        <h3 id="adm-header" style="color:var(--netflix-red); margin-top:0;">จัดการข้อมูลเนื้อหา</h3>
        <div style="display:grid; grid-template-columns: 2fr 2fr 1fr auto; gap:15px;">
            <input type="text" id="adm-title" placeholder="ชื่อเรื่อง">
            <input type="text" id="adm-img" placeholder="URL ปก">
            <select id="adm-cat"><option value="Anime">Anime</option><option value="Movie">Movie</option><option value="Series">Series</option></select>
            <button class="btn-red" id="adm-save-btn" onclick="saveToDB()" style="width:120px;">บันทึก</button>
        </div>
        <div id="season-inputs" style="margin-top:10px;"></div>
        <button onclick="addSField()" style="background:none; color:#777; border:1px dashed #444; width:100%; padding:10px; cursor:pointer; margin-top:10px;">+ เพิ่มซีซันย่อย</button>
    </div>

    <div id="watched-section" style="display:none;">
        <h2 class="section-title" style="color:#2ed573;">รับชมต่อ</h2>
        <div class="content-grid" id="watched-grid"></div>
    </div>

    <div id="main-area">
        <h2 class="section-title" id="main-label">รายการแนะนำ</h2>
        <div class="content-grid" id="main-grid"></div>
    </div>
</div>

<div id="auth-ui" class="auth-card">
    <h1 id="auth-title">Sign In</h1>
    <input type="email" id="email" placeholder="อีเมล">
    <input type="password" id="password" placeholder="รหัสผ่าน">
    <button class="btn-red" onclick="runAuth()" id="auth-btn">เข้าสู่ระบบ</button>
    <p style="margin-top:25px; color:#aaa; cursor:pointer;" onclick="toggleAuth()" id="auth-switch">ยังไม่มีบัญชี? <b>สมัครสมาชิกที่นี่</b></p>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, collection, addDoc, getDocs, query, where, orderBy, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyADNWKhUNqKyF19d-2WBHsHQ1uaZIAN8Bg",
        authDomain: "myanimeweb-1e859.firebaseapp.com",
        projectId: "myanimeweb-1e859",
        storageBucket: "myanimeweb-1e859.firebasestorage.app",
        messagingSenderId: "1018346930735",
        appId: "1:1018346930735:web:dd2d015e2a1f0c628b3cda"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const ADMIN_MAIL = "tungpanithan1931@gmail.com";

    let allData = [], isReg = false, editId = null;

    // --- AUTH (จำระบบสมัครสมาชิกตามสั่ง) ---
    window.toggleAuth = () => {
        isReg = !isReg;
        document.getElementById('auth-title').innerText = isReg ? "Sign Up" : "Sign In";
        document.getElementById('auth-btn').innerText = isReg ? "สมัครสมาชิก" : "เข้าสู่ระบบ";
        document.getElementById('auth-switch').innerHTML = isReg ? "มีบัญชีอยู่แล้ว? <b>เข้าสู่ระบบ</b>" : "ยังไม่มีบัญชี? <b>สมัครสมาชิกที่นี่</b>";
    };

    window.runAuth = () => {
        const m = document.getElementById('email').value, p = document.getElementById('password').value;
        if(isReg) createUserWithEmailAndPassword(auth, m, p).catch(e => alert(e.message));
        else signInWithEmailAndPassword(auth, m, p).catch(e => alert("อีเมลหรือรหัสผ่านผิดพลาด"));
    };

    window.triggerLogout = () => signOut(auth).then(() => location.reload());

    onAuthStateChanged(auth, async user => {
        if(user) {
            document.getElementById('auth-ui').style.display = 'none';
            document.getElementById('main-ui').style.display = 'block';
            document.getElementById('nav-right').style.display = 'flex';
            if(user.email === ADMIN_MAIL) document.getElementById('admin-panel').style.display = 'block';
            
            const d = await getDoc(doc(db, "users", user.uid));
            let nick = user.email.split('@')[0], ava = "https://upload.wikimedia.org/wikipedia/commons/0/0b/Netflix-avatar.png";
            if(d.exists()) { nick = d.data().nickname; ava = d.data().avatar; }
            document.getElementById('user-display').innerHTML = `<div class="user-box"><span>${nick}</span><img src="${ava}" class="user-img"></div>`;
            
            loadData(); loadWatched(user.uid);
        } else {
            document.getElementById('auth-ui').style.display = 'block';
            document.getElementById('main-ui').style.display = 'none';
        }
    });

    // --- CORE LOGIC (ใช้ฐานโค้ดล่าสุดเสมอ) ---
    async function loadData() {
        const s = await getDocs(query(collection(db, "all_anime"), orderBy("created", "desc")));
        allData = s.docs.map(d => ({ id: d.id, ...d.data() }));
        render(allData);
    }

    async function loadWatched(uid) {
        const q = query(collection(db, "user_watched"), where("uid", "==", uid), orderBy("timestamp", "desc"));
        const s = await getDocs(q);
        const g = document.getElementById('watched-grid'); g.innerHTML = "";
        if(!s.empty) {
            document.getElementById('watched-section').style.display = 'block';
            s.forEach(d => {
                const data = d.data();
                g.innerHTML += `<div class="card" style="scale:0.95;"><button class="btn-clear-history" onclick="removeHistory('${d.id}')">✕</button><img src="${data.image}"><div class="card-overlay">${data.mainTitle}</div></div>`;
            });
        }
    }

    function render(list) {
        const g = document.getElementById('main-grid'); g.innerHTML = "";
        list.forEach(item => {
            g.innerHTML += `<div class="card"><img src="${item.image}"><div class="card-overlay">${item.title}</div></div>`;
        });
    }

    window.handleSearch = () => {
        const q = document.getElementById('search-input').value.toLowerCase();
        render(allData.filter(x => x.title.toLowerCase().includes(q)));
    };

    window.filterCat = (c) => render(allData.filter(x => x.category === c));
    window.showHome = () => { document.getElementById('main-area').style.display='block'; render(allData); };
    window.showOnlyWatched = () => { document.getElementById('main-area').style.display='none'; document.getElementById('watched-section').style.display='block'; };
</script>
</body>
</html>
